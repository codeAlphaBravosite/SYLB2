    <rect x="22" y="20" width="26" height="60" rx="4" fill="white"/>

</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
const{useState,useEffect,useRef,useCallback,useMemo,memo}=React;
const ce=React.createElement;

/* ─── STYLES ─────────────────────────────────────────────────── */
const G=memo(()=>ce('style',null,`
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body,#root{height:100%;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
  body{font-family:'Geist',system-ui,sans-serif;background:#F2F2F7}
  button,input,textarea,select{font-family:inherit}
  ::-webkit-scrollbar{display:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(12px)}}
  @keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
`));

/* ─── ICONS ──────────────────────────────────────────────────── */
const ICONS={

  chart:{lines:['18 20 18 10','12 20 12 4','6 20 6 14']},
  cog:['circle:12,12,3','M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z'],
  plus:{lines:['12 5 12 19','5 12 19 12']},
  chevD:'M6 9l6 6 6-6',
  chevR:'M9 18l6-6-6-6',
  trash:['poly:3 6 5 6 21 6','M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6','M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2'],
  check:'M20 6L9 17 4 12',
  edit:['M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7','M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'],
  close:{lines:['18 6 6 18','6 6 18 18']},
  sun:{circle:'12,12,5',lines:['12 1 12 3','12 21 12 23','4.22 4.22 5.64 5.64','18.36 18.36 19.78 19.78','1 12 3 12','21 12 23 12','4.22 19.78 5.64 18.36','18.36 5.64 19.78 4.22']},
  moon:'M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z',
  download:['M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4','poly:7 10 12 15 17 10','M12 15V3'],
  upload:['M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4','poly:17 8 12 3 7 8','M12 3v12'],
  clock:['circle:12,12,10','M12 6v6l4 2'],
  flag:['M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z','M4 22V15'],
  link:['M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71','M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71'],
  warn:['M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z','M12 9v4','M12 17h.01'],

  sort:['M3 6h18','M7 12h10','M11 18h2'],
  note:['M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7','M14 2l6 6','M14 2v6h6','M9 12h6','M9 16h4'],
  star:['M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'],
  book2:['M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z','M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z'],
};
const Ic=memo(({n,size=22,color='currentColor',sw=1.8})=>{
  const p={fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
  const ic=ICONS[n];if(!ic)return null;
  const paths=[];
  const items=Array.isArray(ic)?ic:[ic];
  items.forEach((d,i)=>{
    if(typeof d==='string'){
      if(d.startsWith('poly:'))paths.push(ce('polyline',{...p,key:i,points:d.slice(5)}));
      else if(d.startsWith('circle:')){const[cx,cy,r]=d.slice(7).split(',');paths.push(ce('circle',{...p,key:i,cx,cy,r}));}
      else paths.push(ce('path',{...p,key:i,d}));
    }else if(d&&d.lines){d.lines.forEach((l,j)=>{const[x1,y1,x2,y2]=l.split(' ');paths.push(ce('line',{...p,key:j,x1,y1,x2,y2}));});}
    else if(d&&d.circle){const[cx,cy,r]=d.circle.split(',');paths.push(ce('circle',{...p,key:'c',cx,cy,r}));if(d.lines)d.lines.forEach((l,j)=>{const[x1,y1,x2,y2]=l.split(' ');paths.push(ce('line',{...p,key:j,x1,y1,x2,y2}));});}
  });
  return ce('svg',{viewBox:'0 0 24 24',width:size,height:size,'aria-hidden':'true',style:{display:'block',flexShrink:0}},paths);
});

/* ─── CONFIG ─────────────────────────────────────────────────── */
const STATUS={
  'not-started':{label:'Not Started',color:'#8E8E93',bg:'#8E8E9322'},
  'studying':   {label:'Studying',   color:'#FF9500',bg:'#FF950022'},
  'studied':    {label:'Studied',    color:'#34C759',bg:'#34C75922'},
  'do-revision':{label:'Do Revision',color:'#FF3B30',bg:'#FF3B3022'},
};
const PRIORITY={
  'high':    {label:'High',    fullLabel:'High Weightage',color:'#FF3B30',bg:'#FF3B3018'},
  'normal':  {label:'Normal',  fullLabel:'Normal',        color:'#007AFF',bg:'#007AFF18'},
  'optional':{label:'Optional',fullLabel:'Optional',      color:'#8E8E93',bg:'#8E8E9318'},
};
const COLORS=['#007AFF','#FF3B30','#34C759','#FF9500','#AF52DE','#5AC8FA','#FF2D55','#00C7BE','#FF6B00','#636366'];
const REV_OPTIONS=[{days:3,label:'3 days'},{days:5,label:'5 days'},{days:7,label:'7 days'},{days:14,label:'14 days'},{days:21,label:'21 days'}];
const PRI_ORD={high:3,normal:2,optional:1};
const ST_ORD={'not-started':0,'studying':1,'do-revision':2,'studied':3};
const TH={
  light:{bg:'#F2F2F7',card:'#FFFFFF',card2:'#F2F2F7',card3:'#E5E5EA',text:'#000000',text2:'#6C6C70',text3:'#C7C7CC',sep:'#E5E5EA',nav:'rgba(255,255,255,.95)',blue:'#007AFF',red:'#FF3B30',green:'#34C759',orange:'#FF9500'},
  dark: {bg:'#000000',card:'#1C1C1E',card2:'#2C2C2E',card3:'#3A3A3C',text:'#FFFFFF',text2:'#8E8E93',text3:'#48484A',sep:'#2C2C2E',nav:'rgba(0,0,0,.95)',  blue:'#0A84FF',red:'#FF453A',green:'#30D158',orange:'#FF9F0A'},
};
const T=dark=>dark?TH.dark:TH.light;

/* ─── UTILS ──────────────────────────────────────────────────── */
const uid=()=>typeof crypto!=='undefined'&&crypto.randomUUID?crypto.randomUUID():(Math.random().toString(36).slice(2)+Date.now().toString(36));
const toDay=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const daysTo=dateStr=>{
  if(!dateStr)return null;
  const[y,m,d]=dateStr.split('-').map(Number);
  const now=new Date();
  return Math.ceil((new Date(y,m-1,d)-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
};
const phaseOf=d=>{
  if(d==null)return null;
  if(d<0) return{label:'Exam complete \u{1F393}',color:'#34C759'};
  if(d===0)return{label:'Exam day! \u{1F3AF}',color:'#FF3B30'};
  if(d>60) return{label:'Learning Phase',color:'#007AFF'};
  if(d>30) return{label:'Consolidation',color:'#FF9500'};
  if(d>14) return{label:'Revision Mode',color:'#AF52DE'};
  return      {label:'Final Sprint \u{1F525}',color:'#FF3B30'};
};
const isDue=(t,revDays=7)=>{
  if(t.status!=='studied'||!t.studiedDate)return false;
  const[y,m,d]=t.studiedDate.split('-').map(Number);
  return new Date()>=new Date(y,m-1,d+revDays);
};
const revDaysLeft=(t,revDays=7)=>{
  if(t.status!=='studied'||!t.studiedDate)return null;
  const[y,m,d]=t.studiedDate.split('-').map(Number);
  const due=new Date(y,m-1,d+revDays);
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.ceil((due-today)/86400000);
};
const pct=topics=>!topics.length?0:Math.round(topics.filter(t=>t.status==='studied'||t.status==='do-revision').length/topics.length*100);
const flatAll=subjects=>subjects.flatMap(s=>s.chapters.flatMap(c=>c.topics.map(t=>({...t,subjectId:s.id,subjectName:s.name,subjectColor:s.color,chapterId:c.id,chapterName:c.name}))));
const validateImport=d=>{
  if(!d||typeof d!=='object'||!Array.isArray(d.subjects))return false;
  for(const s of d.subjects){
    if(!s.id||typeof s.name!=='string'||!Array.isArray(s.chapters))return false;
    for(const c of s.chapters){
      if(!c.id||typeof c.name!=='string'||!Array.isArray(c.topics))return false;
      for(const t of c.topics){if(!t.id||typeof t.name!=='string')return false;}
    }
  }
  return true;
};
const applySort=(topics,key)=>{
  if(!key||key==='manual')return topics;
  return[...topics].sort((a,b)=>{
    if(key==='priority')return(PRI_ORD[b.priority]||2)-(PRI_ORD[a.priority]||2);
    if(key==='status')return(ST_ORD[a.status]||0)-(ST_ORD[b.status]||0);
    if(key==='az')return a.name.localeCompare(b.name,undefined,{sensitivity:'base'});
    return 0;
  });
};

/* ─── STORE ──────────────────────────────────────────────────── */
const STORE_KEY='st_v11';
const INIT={onboarded:false,profile:{examName:'',examDate:''},subjects:[],settings:{dark:false,revDays:7}};
const safeParse=raw=>{try{const d=JSON.parse(raw);return d&&typeof d==='object'?{...INIT,...d,settings:{...INIT.settings,...(d.settings||{})}}:null;}catch{return null;}};
const loadState=()=>safeParse(localStorage.getItem(STORE_KEY))||safeParse(localStorage.getItem('st_v10'))||{...INIT};
let _st=loadState();
const _listeners=new Set();
let _saveTimer=null;
const persist=()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(_st));}catch{}};
const dispatch=fn=>{_st=fn(_st);clearTimeout(_saveTimer);_saveTimer=setTimeout(persist,300);_listeners.forEach(f=>f());};
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'){clearTimeout(_saveTimer);persist();}});
const useStore=()=>{
  const[,tick]=useState(0);
  useEffect(()=>{const f=()=>tick(n=>n+1);_listeners.add(f);return()=>_listeners.delete(f);},[]);
  return _st;
};
const setTopicStatus=(sId,cId,tId,status)=>dispatch(st=>({
  ...st,subjects:st.subjects.map(sub=>sub.id!==sId?sub:{
    ...sub,chapters:sub.chapters.map(ch=>ch.id!==cId?ch:{
      ...ch,topics:ch.topics.map(t=>t.id!==tId?t:{
        ...t,status,studiedDate:status==='studied'?(t.studiedDate||toDay()):null
      })
    })
  })
}));

/* ─── TOAST + UNDO ───────────────────────────────────────────── */
const _toastListeners=new Set();
let _toastId=0;
const showToast=(msg,action,onAction)=>{const id=++_toastId;_toastListeners.forEach(f=>f({id,msg,action,onAction}));};
let _undoSnapshot=null;
const dispatchWithUndo=(fn,msg)=>{
  _undoSnapshot=JSON.parse(JSON.stringify(_st));
  dispatch(fn);
  showToast(msg,'Undo',()=>{if(_undoSnapshot){_st=_undoSnapshot;clearTimeout(_saveTimer);persist();_listeners.forEach(f=>f());_undoSnapshot=null;}});
};
const Toast=()=>{
  const[toasts,setToasts]=useState([]);
  useEffect(()=>{
    const add=t=>{
      setToasts(p=>[...p,{...t,out:false}]);
      setTimeout(()=>setToasts(p=>p.map(x=>x.id===t.id?{...x,out:true}:x)),3600);
      setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==t.id)),4100);
    };
    _toastListeners.add(add);return()=>_toastListeners.delete(add);
  },[]);
  if(!toasts.length)return null;
  return ce('div',{role:'status','aria-live':'polite',style:{position:'fixed',bottom:'calc(90px + env(safe-area-inset-bottom,0px))',left:'50%',transform:'translateX(-50%)',zIndex:900,display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'calc(100% - 32px)',maxWidth:398,pointerEvents:'none'}},
    toasts.map(t=>ce('div',{key:t.id,style:{background:'rgba(28,28,30,.97)',backdropFilter:'blur(20px)',color:'#fff',borderRadius:14,padding:'13px 18px',fontSize:15,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.3)',animation:t.out?'toastOut .45s ease forwards':'toastIn .28s ease',pointerEvents:'all'}},
      ce('span',null,t.msg),
      t.action&&ce('button',{onClick:()=>{t.onAction&&t.onAction();setToasts(p=>p.filter(x=>x.id!==t.id));},style:{background:'none',border:'none',color:'#0A84FF',fontSize:15,fontWeight:700,cursor:'pointer',padding:0,whiteSpace:'nowrap'}},t.action),
    ))
  );
};

/* ─── DELETE PORTAL (never clipped) ─────────────────────────── */
const _delListeners=new Set();
const showDelConfirm=(label,onConfirm)=>_delListeners.forEach(f=>f({label,onConfirm}));
const DelConfirmOverlay=()=>{
  const[state,setState]=useState(null);
  useEffect(()=>{const h=s=>setState(s);_delListeners.add(h);return()=>_delListeners.delete(h);},[]);
  useEffect(()=>{
    if(!state)return;
    const esc=e=>{if(e.key==='Escape')setState(null);};
    document.addEventListener('keydown',esc);return()=>document.removeEventListener('keydown',esc);
  },[state]);
  if(!state)return null;
  return ce('div',{onClick:()=>setState(null),style:{position:'fixed',inset:0,zIndex:800,display:'flex',alignItems:'flex-end',justifyContent:'center',padding:'0 16px calc(104px + env(safe-area-inset-bottom,0px))'}},
    ce('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',animation:'fadeIn .18s'}}),
    ce('div',{onClick:e=>e.stopPropagation(),role:'alertdialog','aria-modal':'true',style:{position:'relative',background:'#1C1C1E',borderRadius:18,padding:'20px 20px 16px',width:'100%',maxWidth:390,boxShadow:'0 8px 40px rgba(0,0,0,.5)',animation:'fadeUp .22s ease'}},
      ce('p',{style:{fontSize:16,fontWeight:700,color:'#fff',marginBottom:6}},'Delete this item?'),
      ce('p',{style:{fontSize:14,color:'#8E8E93',marginBottom:20,lineHeight:1.5}},'"'+state.label+'" will be removed. You can undo immediately after.'),
      ce('div',{style:{display:'flex',gap:10}},
        ce('button',{onClick:()=>setState(null),style:{flex:1,padding:14,background:'#2C2C2E',color:'#fff',border:'none',borderRadius:12,fontSize:16,fontWeight:600,cursor:'pointer',minHeight:50}},'Cancel'),
        ce('button',{onClick:()=>{state.onConfirm();setState(null);},style:{flex:1,padding:14,background:'#FF3B30',color:'#fff',border:'none',borderRadius:12,fontSize:16,fontWeight:700,cursor:'pointer',minHeight:50}},'Delete'),
      ),
    ),
  );
};
const DelBtn=memo(({onDelete,size=18,label='item'})=>{
  const fire=useCallback(e=>{e.stopPropagation();showDelConfirm(label,onDelete);},[label,onDelete]);
  return ce('button',{onClick:fire,'aria-label':'Delete '+label,style:{background:'transparent',border:'none',cursor:'pointer',padding:8,display:'flex',alignItems:'center',borderRadius:8,minHeight:44,minWidth:44,justifyContent:'center'}},
    ce(Ic,{n:'trash',size,color:'#FF453A',sw:1.6}));
});

/* ─── CONFIRM MODAL ──────────────────────────────────────────── */
const ConfirmModal=memo(({open,title,msg,onConfirm,onCancel,C,confirmLabel='Yes',danger=true})=>{
  const ref=useRef(null);
  useEffect(()=>{
    if(!open)return;
    setTimeout(()=>{const b=ref.current&&ref.current.querySelector('button');if(b)b.focus();},60);
    const esc=e=>{if(e.key==='Escape')onCancel();};
    document.addEventListener('keydown',esc);return()=>document.removeEventListener('keydown',esc);
  },[open]);
  if(!open)return null;
  return ce('div',{style:{position:'fixed',inset:0,zIndex:700,display:'flex',alignItems:'center',justifyContent:'center',padding:24},onClick:onCancel},
    ce('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,.65)',animation:'fadeIn .18s'}}),
    ce('div',{ref,role:'alertdialog','aria-modal':'true',onClick:e=>e.stopPropagation(),style:{position:'relative',background:C.card,borderRadius:22,padding:28,width:'100%',maxWidth:340,boxShadow:'0 20px 60px rgba(0,0,0,.4)',animation:'fadeUp .2s ease'}},
      ce('h2',{style:{fontSize:20,fontWeight:800,color:C.text,marginBottom:10}},title),
      ce('p',{style:{fontSize:15,color:C.text2,lineHeight:1.6,marginBottom:24}},msg),
      ce('div',{style:{display:'flex',gap:10}},
        ce('button',{onClick:onCancel,style:{flex:1,padding:14,background:C.card2,color:C.text2,border:'1px solid '+C.sep,borderRadius:14,fontSize:15,cursor:'pointer',fontWeight:500,minHeight:50}},'Cancel'),
        ce('button',{onClick:onConfirm,style:{flex:1,padding:14,background:danger?'#FF3B30':C.blue,color:'#fff',border:'none',borderRadius:14,fontSize:15,fontWeight:700,cursor:'pointer',minHeight:50}},confirmLabel),
      ),
    ),
  );
});

/* ─── SHEET ──────────────────────────────────────────────────── */
const Sheet=memo(({open,onClose,title,children,C})=>{
  const ref=useRef(null);const closeRef=useRef(onClose);
  useEffect(()=>{closeRef.current=onClose;});
  useEffect(()=>{
    if(!open||!ref.current)return;
    const el=ref.current;
    const SEL='button:not([disabled]),input:not([disabled]),textarea:not([disabled]),select:not([disabled]),a[href],[tabindex]:not([tabindex="-1"])';
    const get=()=>[...el.querySelectorAll(SEL)];
    setTimeout(()=>{const f=get();if(f[0])f[0].focus();},60);
    const trap=e=>{
      const f=get();if(!f.length)return;

const Onboarding=()=>{
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');
  const[date,setDate]=useState('');
  const prefersDark=useMemo(()=>!!(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches),[]);
  const C=prefersDark?TH.dark:TH.light;
  const valid=[name.trim().length>0,!!date];
  const next=useCallback(()=>{
    if(step<1){setStep(1);return;}
    dispatch(s=>({...s,onboarded:true,profile:{examName:name,examDate:date},settings:{...s.settings,dark:prefersDark}}));
  },[step,name,date,prefersDark]);
  const onKey=useCallback(e=>{if(e.key==='Enter'&&valid[step])next();},[valid,step,next]);
  return ce('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 28px'},onKeyDown:onKey},
    ce('div',{style:{width:'100%',maxWidth:380,animation:'fadeUp .3s ease'}},
      ce('div',{style:{textAlign:'center',marginBottom:44}},
        ce('div',{style:{fontSize:64,marginBottom:14}},step===0?'\u{1F3AF}':'\u{1F4C5}'),
        ce('h1',{style:{fontSize:28,fontWeight:800,color:C.text,lineHeight:1.2}},step===0?'Which exam are you preparing for?':'When is your exam?'),
        ce('div',{style:{display:'flex',gap:6,justifyContent:'center',marginTop:22}},[0,1].map(i=>ce('div',{key:i,style:{height:3,width:i===step?28:8,borderRadius:99,background:i<=step?C.blue:C.sep,transition:'all .3s'}}))),
      ),
      ce('div',{style:{marginBottom:24}},
        step===0?ce(Inp,{C,value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. UPSC, JEE, GMAT\u2026',autoFocus:true})
               :ce(Inp,{C,type:'date',value:date,onChange:e=>setDate(e.target.value),min:toDay()}),
      ),
      ce('button',{onClick:next,disabled:!valid[step],style:{width:'100%',padding:16,background:valid[step]?C.blue:C.card3,color:valid[step]?'#fff':C.text2,border:'none',borderRadius:16,fontSize:17,fontWeight:700,cursor:valid[step]?'pointer':'default',transition:'all .2s',minHeight:52}},step<1?'Continue \u2192':'Get Started'),
      step>0&&ce('button',{onClick:()=>setStep(0),style:{width:'100%',marginTop:12,padding:12,background:'transparent',border:'none',color:C.text2,fontSize:15,cursor:'pointer',minHeight:44}},'\u2190 Back'),
    ),
  );
};

        ),
      ),
      ce('div',{style:{background:C.card,borderRadius:18,padding:'0 20px',border:'1px solid '+C.sep,marginBottom:22}},
        ce('div',{style:{padding:'16px 0',display:'flex',alignItems:'center',gap:14,minHeight:60}},
          ce('div',{style:{width:36,height:36,borderRadius:10,background:C.red+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},ce(Ic,{n:'trash',size:18,color:C.red,sw:1.6})),
          ce('span',{style:{fontSize:16,fontWeight:500,color:C.red,flex:1}},'Reset All Data'),
          ce(DelBtn,{onDelete:()=>dispatch(()=>({...INIT,onboarded:true,profile:s.profile})),size:16,label:'all data'}),
        ),
      ),
      ce('p',{style:{fontSize:13,color:C.text2,textAlign:'center',lineHeight:1.8}},'All data stored locally on your device.\nNo accounts, no tracking, no ads.'),
    ),
    ce(ConfirmModal,{open:showImportConfirm,title:'Replace all data?',msg:'This will replace all your subjects, topics and progress with the backup file.',onConfirm:doImport,onCancel:()=>{setShowImportConfirm(false);setImportPending(null);},C,confirmLabel:'Yes, import',danger:true}),
  );
};

/* ─── APP ────────────────────────────────────────────────────── */
const NAV=[
  {id:'today',   icon:'home',   label:'Today'},
  {id:'syllabus',icon:'book',   label:'Syllabus'},
  {id:'revise',  icon:'refresh',label:'Revise'},
  {id:'stats',   icon:'chart',  label:'Stats'},
  {id:'settings',icon:'cog',    label:'Settings'},
];
const SCREENS={today:TodayScreen,syllabus:SyllabusScreen,revise:ReviseScreen,stats:StatsScreen,settings:SettingsScreen};

function App(){
  const s=useStore();
  const C=useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const[tab,setTab]=useState('today');

  /* Auto-promote studied→do-revision on mount and hourly */
  const promote=useCallback(()=>{
    const rd=(_st.settings&&_st.settings.revDays)||7;
    if(!flatAll(_st.subjects).some(t=>isDue(t,rd)&&t.status==='studied'))return;
    dispatch(st=>({...st,subjects:st.subjects.map(sub=>({...sub,chapters:sub.chapters.map(ch=>({...ch,topics:ch.topics.map(t=>isDue(t,rd)&&t.status==='studied'?{...t,status:'do-revision'}:t)}))}))}));
  },[]);
  useEffect(()=>{promote();const iv=setInterval(promote,60*60*1000);return()=>clearInterval(iv);},[promote]);

  /* Revise badge = due + manually marked */
  const revCount=useMemo(()=>{
    const rd=(s.settings&&s.settings.revDays)||7;
    return flatAll(s.subjects).filter(t=>isDue(t,rd)||t.status==='do-revision').length;
  },[s.subjects,s.settings&&s.settings.revDays]);

  if(!s.onboarded)return ce(React.Fragment,null,ce(G),ce(Onboarding));
  const Screen=SCREENS[tab]||TodayScreen;
  return ce(React.Fragment,null,
    ce(G),
    ce('div',{style:{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:C.bg}},
      ce('div',{key:tab,style:{animation:'fadeUp .18s ease'}},ce(Screen)),
      ce('nav',{'aria-label':'Main navigation',style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.nav,backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderTop:'1px solid '+C.sep,display:'flex',padding:'10px 0',zIndex:200,paddingBottom:'calc(10px + env(safe-area-inset-bottom,0px))'}},
        NAV.map(item=>{
          const active=tab===item.id;
          return ce('button',{key:item.id,onClick:()=>setTab(item.id),'aria-label':item.label,'aria-current':active?'page':undefined,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:'4px 0',position:'relative',minHeight:52}},
            ce('div',{style:{width:34,height:34,borderRadius:11,background:active?C.blue+'18':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .18s'}},
              ce(Ic,{n:item.icon,size:21,color:active?C.blue:C.text2,sw:active?2.2:1.6})),
            item.id==='revise'&&revCount>0&&ce('div',{'aria-label':revCount+' topics to revise',style:{position:'absolute',top:0,left:'calc(50% + 6px)',minWidth:18,height:18,padding:'0 4px',background:C.red,borderRadius:99,fontSize:10,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid '+C.bg}},revCount>99?'99+':revCount),
            ce('span',{style:{fontSize:10,fontWeight:active?700:400,color:active?C.blue:C.text2,transition:'color .18s'}},item.label),
          );
        }),
      ),
      ce(Toast),
      ce(DelConfirmOverlay),
    ),
  );
}

const _root=ReactDOM.createRoot(document.getElementById('root'));
_root.render(ce(App));
requestAnimationFrame(()=>requestAnimationFrame(()=>{const sp=document.getElementById('splash');if(sp){sp.classList.add('out');setTimeout(()=>sp.remove(),350);}}));
</script>
</body>
</html>
