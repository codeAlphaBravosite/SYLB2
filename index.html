<!-- Watchdog: hide splash & show error if app hasn't mounted in 8s -->
<script>
  (function(){
    var TIMEOUT = 8000;
    var t = setTimeout(function(){
      var splash = document.getElementById("splash");
      var root   = document.getElementById("root");
      if(splash && root && !root.hasChildNodes()){
        splash.style.transition = "none";
        var msg = document.createElement("div");
        msg.style.cssText = "color:rgba(255,255,255,.9);font-size:15px;margin-top:24px;text-align:center;max-width:260px;line-height:1.6;font-family:system-ui,sans-serif;";
        msg.innerHTML = "⚠️ Failed to load.<br>Check your internet connection and reload.";
        var btn = document.createElement("button");
        btn.textContent = "Reload";
        btn.style.cssText = "margin-top:18px;padding:12px 28px;background:white;color:#007AFF;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif;";
        btn.onclick = function(){ location.reload(); };
        splash.appendChild(msg);
        splash.appendChild(btn);
        // Stop the pulsing animation
        var svg = splash.querySelector("svg");
        if(svg) svg.style.animation = "none";
        var p = splash.querySelector("p");
        if(p) p.style.display = "none";
      }
    }, TIMEOUT);
    // If app mounts successfully, cancel the watchdog
    window.__clearSplashWatchdog = function(){ clearTimeout(t); };
  })();
</script>

const phaseOf = d => {
  if (d==null) return null;
  if (d>60) return { label:"Learning Phase", color:"#007AFF" };
  if (d>30) return { label:"Consolidation",  color:"#FF9500" };
  if (d>14) return { label:"Revision Mode",  color:"#AF52DE" };
  return          { label:"Final Sprint",    color:"#FF3B30" };
};

const isDue = t => {
  if (t.status!=="studied"||!t.studiedDate) return false;
  const due = new Date(t.studiedDate);
  due.setDate(due.getDate()+REV_DAYS);
  return new Date()>=due;
};

const pct = topics => {
  if (!topics.length) return 0;
  return Math.round(topics.filter(t=>t.status==="studied"||t.status==="do-revision").length/topics.length*100);
};

/* ═══════════════════════════════════════════════════════
   STORE  — debounced persist, stable listeners
═══════════════════════════════════════════════════════ */
const KEY  = "st_v9";
const INIT = { onboarded:false, profile:{ examName:"", examDate:"" }, subjects:[], settings:{ dark:false } };

const safeParse = raw => {
  try {
    const d = JSON.parse(raw);
    if (!d||typeof d!=="object") return INIT;
    return { ...INIT, ...d, settings:{ ...INIT.settings, ...(d.settings||{}) } };
  } catch { return INIT; }
};

let _st = safeParse(localStorage.getItem(KEY)||"");
let _ls = new Set();
let _pt = null; // persist timer

const useStore = () => {
  const [, tick] = useState(0);
  useEffect(()=>{
    const fn = ()=>tick(n=>n+1);
    _ls.add(fn);
    return ()=>_ls.delete(fn);
  },[]);
  return _st;
};

const dispatch = fn => {
  _st = fn(_st);
  clearTimeout(_pt);
  _pt = setTimeout(()=>{ try{ localStorage.setItem(KEY,JSON.stringify(_st)); }catch{} }, 300);
  _ls.forEach(f=>f());
};

// Shared status updater — studiedDate logic corrected
const setStatus = (subId,chId,tId,status) =>

    subjects:st.subjects.map(sub=>sub.id!==subId?sub:{

  const r = (size-sw*2)/2, circ = 2*Math.PI*r;
  return(

      style={{ flexShrink:0, transform:"rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color+"30"} strokeWidth={sw}/>

});

/* Two-stage delete — no confirm() */
const DelBtn = memo(({ onDelete, size=18 })=>{
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);

  const arm = e=>{ e.stopPropagation(); setArmed(true); timer.current=setTimeout(()=>setArmed(false),3000); };
  const fire= e=>{ e.stopPropagation(); clearTimeout(timer.current); setArmed(false); onDelete(); };
  const off = e=>{ e.stopPropagation(); clearTimeout(timer.current); setArmed(false); };
  useEffect(()=>()=>clearTimeout(timer.current),[]);

  if(armed) return(
    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
      <button onClick={fire} style={{ padding:"6px 14px", background:"#FF3B30", color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:600, cursor:"pointer", minHeight:36 }}>Delete</button>
      <button onClick={off}  style={{ padding:"6px 12px", background:"transparent", color:"#8E8E93", border:"1px solid #C7C7CC", borderRadius:8, fontSize:13, cursor:"pointer", minHeight:36 }}>Cancel</button>
    </div>
  );
  return(
    <button onClick={arm} style={{ background:"transparent", border:"none", cursor:"pointer", padding:8, display:"flex", alignItems:"center", borderRadius:8, minHeight:44, minWidth:44, justifyContent:"center" }}>
      <Ic n="trash" size={size} color="#8E8E93" sw={1.6}/>
    </button>
  );
});

/* ═══════════════════════════════════════════════════════
   BOTTOM SHEET
   KEY FIX: No focus trap (breaks mobile keyboard).
   Escape handled via a ref so handler is always fresh
   without the effect depending on onClose.
═══════════════════════════════════════════════════════ */
const Sheet = memo(({ open, onClose, title, children, C })=>{
  const onCloseRef = useRef(onClose);
  useEffect(()=>{ onCloseRef.current = onClose; });          // always fresh, no dep issues

  useEffect(()=>{
    if(!open) return;
    const esc = e=>{ if(e.key==="Escape") onCloseRef.current?.(); };
    document.addEventListener("keydown",esc);
    return ()=>document.removeEventListener("keydown",esc);
  },[open]);                                                 // only [open] — stable

  if(!open) return null;
  return(
    <div style={{ position:"fixed", inset:0, zIndex:500, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}
      onClick={onClose}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.55)", animation:"fadeIn .2s ease" }}/>
      <div role="dialog" aria-modal="true" aria-label={title}
        onClick={e=>e.stopPropagation()}
        style={{ position:"relative", background:C.card, borderRadius:"22px 22px 0 0",
          maxHeight:"90vh", overflowY:"auto", animation:"sheetUp .28s ease",
          paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        <div style={{ display:"flex", justifyContent:"center", padding:"14px 0 0" }} aria-hidden="true">
          <div style={{ width:36, height:4, borderRadius:99, background:C.card3 }}/>
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 22px 0" }}>
          <span style={{ fontSize:18, fontWeight:700, color:C.text }}>{title}</span>
          <button onClick={onClose} aria-label="Close"
            style={{ background:C.card2, border:"none", borderRadius:"50%", width:34, height:34,
              display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
            <Ic n="close" size={14} color={C.text2} sw={2}/>
          </button>
        </div>
        <div style={{ padding:"20px 22px 32px" }}>{children}</div>
      </div>
    </div>
  );
});

// Controlled input — does NOT dispatch on change; parent manages state
const Inp = ({ C, style:s={}, ...rest })=>(
  <input {...rest}
    style={{ width:"100%", padding:"14px 16px", borderRadius:14, border:`1.5px solid ${C.sep}`,
      fontSize:16, background:C.card2, color:C.text, outline:"none",
      WebkitAppearance:"none", ...s }}/>
);

/* ═══════════════════════════════════════════════════════
   STATUS PILL ROW
═══════════════════════════════════════════════════════ */
const StatusRow = memo(({ currentStatus, isRevDue, onChange, C })=>{
  const eff = isRevDue ? "do-revision" : currentStatus;
  return(
    <div style={{ display:"flex", gap:6, flexWrap:"wrap", paddingTop:12, borderTop:`1px solid ${C.sep}` }}>
      {Object.entries(STATUS).map(([k,v])=>{
        const active = eff===k;
        return(
          <button key={k} onClick={e=>{ e.stopPropagation(); onChange(k); }}
            style={{ padding:"7px 13px", borderRadius:99, fontSize:12, fontWeight:600,
              cursor:"pointer", border:`1.5px solid ${active?v.color:C.sep}`,
              background:active?v.color:"transparent", color:active?"#fff":C.text2,
              transition:"all .15s", whiteSpace:"nowrap", minHeight:36 }}>
            {v.label}
          </button>
        );
      })}
    </div>
  );
});

/* ═══════════════════════════════════════════════════════
   TOPIC CARD (Syllabus screen)
   FIX: accepts dark bool, memo-computes C internally
═══════════════════════════════════════════════════════ */
const TopicCard = memo(({ topic, subjectId, chapterId, subjectName, chapterName, subjectColor, onTap, onDelete, dark })=>{
  const C   = T(dark);
  const due = isDue(topic);
  const eff = due?"do-revision":topic.status;
  const st  = STATUS[eff]||STATUS["not-started"];
  const pri = PRIORITY[topic.priority||"normal"];
  const done= topic.status==="studied"||topic.status==="do-revision";

  const toggle = useCallback(e=>{
    e.stopPropagation();
    setStatus(subjectId,chapterId,topic.id,done?"not-started":"studied");
  },[subjectId,chapterId,topic.id,done]);

  const change = useCallback(k=>setStatus(subjectId,chapterId,topic.id,k),[subjectId,chapterId,topic.id]);

  return(
    <article onClick={onTap}
      style={{ background:C.card, borderRadius:18, marginBottom:12, border:`1px solid ${C.sep}`,
        boxShadow:dark?"none":"0 2px 8px rgba(0,0,0,.06)",
        display:"flex", alignItems:"stretch", overflow:"hidden", cursor:"pointer" }}>
      <div style={{ width:5, background:st.color, flexShrink:0 }}/>
      <div style={{ flex:1, padding:"16px 16px 16px 18px" }}>
        {/* breadcrumb + delete */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:subjectColor }}/>
            <span style={{ fontSize:12, color:C.text2, fontWeight:500 }}>{subjectName} › {chapterName}</span>
          </div>
          <div onClick={e=>e.stopPropagation()}><DelBtn onDelete={onDelete} size={17}/></div>
        </div>
        {/* checkbox + name */}
        <div style={{ display:"flex", alignItems:"flex-start", gap:14, marginBottom:14 }}>
          <button onClick={toggle} role="checkbox" aria-checked={done}
            aria-label={done?"Mark not started":"Mark studied"}
            style={{ width:32, height:32, borderRadius:9, flexShrink:0, border:"none",
              cursor:"pointer", marginTop:1, background:done?C.green:"transparent",
              outline:`2px solid ${done?C.green:C.card3}`,
              display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s" }}>
            {done&&<Ic n="check" size={14} color="#fff" sw={2.5}/>}
          </button>
          <span style={{ fontSize:17, fontWeight:700, color:done?C.text2:C.text, lineHeight:1.3, flex:1,
            textDecoration:done&&!due?"line-through":"none", textDecorationColor:C.text3 }}>
            {topic.name}
          </span>
        </div>
        {/* badges */}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
          <Badge label={st.label}  color={st.color}  bg={st.bg}/>
          <Badge label={pri.label} color={pri.color} bg={pri.bg}/>
          {topic.examDate&&(
            <span style={{ fontSize:12, color:C.text2, display:"flex", alignItems:"center", gap:4 }}>
              <Ic n="clock" size={11} color={C.text2}/>{topic.examDate}
            </span>
          )}
          {due&&<Badge label="Revision Due!" color={C.red} bg={C.red+"18"}/>}
        </div>
        {topic.notes&&(
          <div style={{ fontSize:13, color:C.text2, lineHeight:1.5, borderTop:`1px solid ${C.sep}`,
            paddingTop:10, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>
            {topic.notes}
          </div>
        )}
        <StatusRow currentStatus={topic.status} isRevDue={due} onChange={change} C={C}/>
      </div>
    </article>
  );
});

/* ═══════════════════════════════════════════════════════
   TOPIC EDIT SHEET
   KEY FIX: ALL fields buffered locally. Single dispatch on save/close.
   No dispatch-per-keystroke = no re-render = keyboard stays open.
═══════════════════════════════════════════════════════ */
const TopicEditSheet = memo(({ topic, subjectId, chapterId, open, onClose, dark })=>{
  const C = T(dark);
  const [form, setForm] = useState(()=>topic||{});

  // Sync when a different topic is opened
  useEffect(()=>{ if(topic) setForm({...topic}); },[topic?.id]);

  const set = useCallback((k,v)=>setForm(p=>({...p,[k]:v})),[]);

  // Write everything to store at once
  const saveAndClose = useCallback(()=>{
    if(!topic) return onClose();
    dispatch(st=>({
      ...st,
      subjects:st.subjects.map(sub=>sub.id!==subjectId?sub:{
        ...sub,
        chapters:sub.chapters.map(ch=>ch.id!==chapterId?ch:{
          ...ch,
          topics:ch.topics.map(t=>t.id!==topic.id?t:{
            ...t, ...form,
            studiedDate: form.status==="studied"
              ? (t.studiedDate||toDay())  // preserve original studied date if already set
              : null,
          }),
        }),
      }),
    }));
    onClose();
  },[topic,subjectId,chapterId,form,onClose]);

  const del = useCallback(()=>{
    dispatch(st=>({
      ...st,
      subjects:st.subjects.map(sub=>sub.id!==subjectId?sub:{
        ...sub,
        chapters:sub.chapters.map(ch=>ch.id!==chapterId?ch:{
          ...ch, topics:ch.topics.filter(t=>t.id!==topic.id),
        }),
      }),
    }));
    onClose();
  },[subjectId,chapterId,topic?.id,onClose]);

  if(!open||!topic) return null;

  const due = isDue(topic);
  const effStatus = due&&form.status==="studied"?"do-revision":form.status;

  return(
    <Sheet open={open} onClose={saveAndClose} title="Edit Topic" C={C}>
      {/* Topic name editable */}
      <Fld label="Topic Name" C={C}>
        <Inp C={C} value={form.name||""} onChange={e=>set("name",e.target.value)}
          inputMode="text" placeholder="Topic name"/>
      </Fld>

      <Fld label="Status" C={C}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {Object.entries(STATUS).map(([k,v])=>(
            <button key={k} onClick={()=>set("status",k)}
              aria-pressed={effStatus===k}
              style={{ padding:"13px 12px", borderRadius:14, cursor:"pointer",
                fontSize:14, fontWeight:600, minHeight:48,
                border:`1.5px solid ${effStatus===k?v.color:C.sep}`,
                background:effStatus===k?v.color+"18":"transparent",
                color:effStatus===k?v.color:C.text2,
                transition:"all .15s", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              {v.label}
              {effStatus===k&&<Ic n="check" size={14} color={v.color} sw={2.5}/>}
            </button>
          ))}
        </div>
      </Fld>

      <Fld label="Priority" C={C}>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {Object.entries(PRIORITY).map(([k,v])=>(
            <button key={k} onClick={()=>set("priority",k)}
              aria-pressed={form.priority===k}
              style={{ padding:"14px 16px", borderRadius:14, cursor:"pointer",
                fontSize:15, fontWeight:500, textAlign:"left", minHeight:50,
                border:`1.5px solid ${form.priority===k?v.color:C.sep}`,
                background:form.priority===k?v.color+"14":"transparent",
                color:form.priority===k?v.color:C.text,
                transition:"all .15s", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              {v.label}
              {form.priority===k&&<Ic n="check" size={15} color={v.color} sw={2.5}/>}
            </button>
          ))}
        </div>
      </Fld>

      <Fld label="Deadline / Exam Date" C={C}>
        <Inp C={C} type="date" value={form.examDate||""} onChange={e=>set("examDate",e.target.value)}/>
      </Fld>

      <Fld label="Notes" C={C}>
        <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)}
          rows={4} placeholder="Notes about this topic…"
          style={{ width:"100%", padding:"14px 16px", borderRadius:14,
            border:`1.5px solid ${C.sep}`, fontSize:15,
            background:C.card2, color:C.text, outline:"none", resize:"none",
            WebkitAppearance:"none" }}/>
      </Fld>

      <Fld label="Resource Link" C={C}>
        <div style={{ position:"relative" }}>
          <div style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)" }}>
            <Ic n="link" size={16} color={C.text2}/>
          </div>
          <Inp C={C} value={form.resources||""} onChange={e=>set("resources",e.target.value)}
            placeholder="YouTube, PDF, article…" inputMode="url" style={{ paddingLeft:40 }}/>
        </div>
        {form.resources&&(
          <a href={form.resources} target="_blank" rel="noopener noreferrer"
            style={{ display:"inline-block", marginTop:8, fontSize:13, color:C.blue, wordBreak:"break-all" }}>
            Open link ↗
          </a>
        )}
      </Fld>

      {topic.studiedDate&&(
        <p style={{ fontSize:13, color:C.text2, marginBottom:20, display:"flex", gap:6, alignItems:"center" }}>
          <Ic n="clock" size={13} color={C.text2}/>
          Studied {topic.studiedDate} · Revision due after {REV_DAYS} days
        </p>
      )}

      {/* Save + Delete */}
      <button onClick={saveAndClose}
        style={{ width:"100%", padding:"16px", background:C.blue, color:"#fff",
          border:"none", borderRadius:16, fontSize:16, fontWeight:700, cursor:"pointer",
          marginBottom:12, minHeight:52 }}>
        Save Changes
      </button>
      <div style={{ borderTop:`1px solid ${C.sep}`, paddingTop:16 }}>
        <DelBtn onDelete={del} size={16}/>
      </div>
    </Sheet>
  );
});

/* ═══════════════════════════════════════════════════════
   ONBOARDING
═══════════════════════════════════════════════════════ */
const Onboarding = ()=>{
  const [step,setStep]   = useState(0);
  const [name,setName]   = useState("");
  const [date,setDate]   = useState("");
  const C = themes.light;

  const steps=[
    { icon:"🎯", title:"Which exam are
you preparing for?", valid:name.trim().length>0,
      body:<Inp C={C} value={name} onChange={e=>setName(e.target.value)}
        placeholder="e.g. UPSC, JEE, GMAT…" inputMode="text"/> },
    { icon:"📅", title:"When is your
exam date?", valid:!!date,
      body:<Inp C={C} type="date" value={date} onChange={e=>setDate(e.target.value)} min={toDay()}/> },
  ];
  const cur=steps[step];

  const next = ()=>{
    if(step<steps.length-1){ setStep(step+1); return; }
    dispatch(s=>({...s, onboarded:true, profile:{ examName:name, examDate:date }}));
  };

  return(
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center",
      justifyContent:"center", padding:"40px 28px" }}>
      <div style={{ width:"100%", maxWidth:380, animation:"fadeUp .3s ease" }}>
        <div style={{ textAlign:"center", marginBottom:44 }}>
          <div style={{ fontSize:64, marginBottom:14 }}>{cur.icon}</div>
          <h1 style={{ fontSize:28, fontWeight:800, color:C.text, lineHeight:1.2, whiteSpace:"pre-line" }}>
            {cur.title}
          </h1>
          <div style={{ display:"flex", gap:6, justifyContent:"center", marginTop:22 }}>
            {steps.map((_,i)=>(
              <div key={i} style={{ height:3, width:i===step?28:8, borderRadius:99,
                background:i<=step?C.blue:C.sep, transition:"all .3s" }}/>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:24 }}>{cur.body}</div>
        <button onClick={next} disabled={!cur.valid}
          style={{ width:"100%", padding:"16px", background:cur.valid?C.blue:C.card3,
            color:cur.valid?"#fff":C.text2, border:"none", borderRadius:16,
            fontSize:17, fontWeight:700, cursor:cur.valid?"pointer":"default",
            transition:"all .2s", minHeight:52 }}>
          {step<steps.length-1?"Continue":"Get Started"}
        </button>
        {step>0&&(
          <button onClick={()=>setStep(s=>s-1)}
            style={{ width:"100%", marginTop:12, padding:"12px", background:"transparent",
              border:"none", color:C.text2, fontSize:15, cursor:"pointer", minHeight:44 }}>
            Back
          </button>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   TODAY SCREEN
═══════════════════════════════════════════════════════ */
const TodayScreen = ()=>{
  const s    = useStore();
  const C    = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const dark = s.settings.dark;
  const all  = useMemo(()=>flatAll(s.subjects),[s.subjects]);
  const dl   = useMemo(()=>daysTo(s.profile.examDate),[s.profile.examDate]);
  const ph   = useMemo(()=>phaseOf(dl),[dl]);
  const over = useMemo(()=>pct(all),[all]);
  const studied    = useMemo(()=>all.filter(t=>t.status==="studied"||t.status==="do-revision").length,[all]);
  const revDue     = useMemo(()=>all.filter(t=>isDue(t)),[all]);
  const studying   = useMemo(()=>all.filter(t=>t.status==="studying"),[all]);
  const upNextGrps = useMemo(()=>s.subjects.reduce((acc,sub)=>{
    const topics = sub.chapters.flatMap(ch=>
      ch.topics.filter(t=>t.status==="not-started"&&t.priority!=="optional")
        .map(t=>({...t, subjectId:sub.id, subjectName:sub.name, subjectColor:sub.color,
          chapterId:ch.id, chapterName:ch.name}))
    ).sort((a,b)=>(PRI_ORD[b.priority]||2)-(PRI_ORD[a.priority]||2));
    if(topics.length) acc.push({sub,topics});
    return acc;
  },[]),[s.subjects]);
  const totalUpNext = useMemo(()=>upNextGrps.reduce((n,g)=>n+g.topics.length,0),[upNextGrps]);
  const hasAny = revDue.length>0||studying.length>0||totalUpNext>0;

  return(
    <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:100 }}>
      <header style={{ position:"sticky", top:0, zIndex:50,
        background:C.nav, backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)",
        padding:"18px 20px 14px", borderBottom:`1px solid ${C.sep}`,
        display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.7px", color:C.text }}>Today</h1>
          {s.profile.examName&&<p style={{ fontSize:13, color:C.text2, marginTop:2 }}>{s.profile.examName}</p>}
        </div>
        {dl!==null&&(
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:28, fontWeight:900, color:ph?.color, lineHeight:1, letterSpacing:"-1px" }}>{dl}</div>
            <div style={{ fontSize:11, color:C.text2, fontWeight:500 }}>days left</div>
          </div>
        )}
      </header>

      <div style={{ padding:"18px 16px" }}>
        {ph&&(
          <div style={{ background:ph.color+"14", borderRadius:16, padding:"13px 18px", marginBottom:16,
            border:`1px solid ${ph.color}28`, display:"flex", alignItems:"center", gap:10 }}>
            <Ic n="flag" size={15} color={ph.color} sw={1.8}/>
            <span style={{ fontSize:14, fontWeight:700, color:ph.color }}>{ph.label}</span>
          </div>
        )}

        {/* Progress hero */}
        <div style={{ background:C.card, borderRadius:22, padding:"22px", marginBottom:14,
          border:`1px solid ${C.sep}`, boxShadow:dark?"none":"0 2px 10px rgba(0,0,0,.07)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:20 }}>
            <div style={{ position:"relative", flexShrink:0 }}>
              <Ring value={over} size={76} sw={7}/>
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:15, fontWeight:900, color:C.blue }}>{over}%</span>
              </div>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:21, fontWeight:800, color:C.text, letterSpacing:"-.5px" }}>{over}% Complete</div>
              <p style={{ fontSize:13, color:C.text2, marginTop:4 }}>{studied} of {all.length} topics</p>
              <div style={{ marginTop:12 }}><Bar value={over} h={7} C={C}/></div>
            </div>
          </div>
        </div>

        {/* Stats row */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:22 }}>
          {[
            { v:revDue.length,   l:"Revise Due", c:C.red    },
            { v:studying.length, l:"Studying",   c:C.orange },
            { v:all.filter(t=>t.status==="not-started").length, l:"Remaining", c:C.text2 },
          ].map(m=>(
            <div key={m.l} style={{ background:C.card, borderRadius:18, padding:"16px 10px", textAlign:"center", border:`1px solid ${C.sep}` }}>
              <div style={{ fontSize:28, fontWeight:900, color:m.c, lineHeight:1, letterSpacing:"-1px" }}>{m.v}</div>
              <div style={{ fontSize:11, color:C.text2, marginTop:5, fontWeight:600 }}>{m.l}</div>
            </div>
          ))}
        </div>

        {all.length===0&&(
          <div style={{ textAlign:"center", padding:"60px 0" }}>
            <Ic n="book" size={40} color={C.text3} sw={1.4}/>
            <p style={{ fontSize:18, fontWeight:700, color:C.text, marginTop:16 }}>No syllabus yet</p>
            <p style={{ fontSize:15, color:C.text2, marginTop:6 }}>Go to Syllabus tab to add subjects</p>
          </div>
        )}
        {all.length>0&&!hasAny&&(
          <div style={{ textAlign:"center", padding:"50px 0" }}>
            <div style={{ width:72, height:72, borderRadius:22, background:C.green+"20",
              display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
              <Ic n="check" size={34} color={C.green} sw={1.8}/>
            </div>
            <p style={{ fontSize:20, fontWeight:700, color:C.text }}>All done!</p>
            <p style={{ fontSize:15, color:C.text2, marginTop:6, lineHeight:1.5 }}>Everything is studied or in revision.</p>
          </div>
        )}

        {revDue.length>0&&<TodaySection icon="clock" label="Revision Due" color={C.red}    topics={revDue}   accentColor={C.red}    dark={dark}/>}
        {studying.length>0&&<TodaySection icon="book"  label="In Progress"  color={C.orange} topics={studying} accentColor={C.orange} dark={dark}/>}
        <UpNextSection groups={upNextGrps} total={totalUpNext} dark={dark}/>

        {dl!==null&&(
          <div style={{ background:ph?.color||C.blue, borderRadius:22, padding:"24px", color:"#fff", marginTop:16 }}>
            <p style={{ fontSize:13, opacity:.8, marginBottom:6 }}>{s.profile.examName}</p>
            <div style={{ fontSize:56, fontWeight:900, lineHeight:1, letterSpacing:"-2px" }}>{dl}</div>
            <p style={{ fontSize:15, opacity:.75, marginTop:6 }}>days remaining</p>
            {over<70&&dl<30&&(
              <p style={{ marginTop:14, background:"rgba(255,255,255,.18)", borderRadius:14,
                padding:"12px 16px", fontSize:14, lineHeight:1.5 }}>
                {100-over}% of your syllabus is remaining with {dl} days to go.
              </p>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   SYLLABUS SCREEN
   KEY FIX: all inline sheet callbacks wrapped in useCallback
   so Sheet never gets a fresh onClose on every keystroke
═══════════════════════════════════════════════════════ */
const SyllabusScreen = ()=>{
  const s    = useStore();
  const C    = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const dark = s.settings.dark;

  const [activeId, setActiveId] = useState(null);
  const [search,   setSearch]   = useState("");
  const [sortKey,  setSortKey]  = useState("manual");
  const [openChs,  setOpenChs]  = useState({});
  const [editT,    setEditT]    = useState(null);

  // Sheet open states
  const [subSheet,   setSubSheet]   = useState(false);
  const [chSheet,    setChSheet]    = useState(false);
  const [topicChId,  setTopicChId]  = useState(null);

  // New item form state
  const [newSubName,  setNewSubName]  = useState("");
  const [newSubColor, setNewSubColor] = useState(COLORS[0]);
  const [newChName,   setNewChName]   = useState("");
  const [newTopicName,setNewTopicName]= useState("");
  const [newTopicPri, setNewTopicPri] = useState("normal");

  const activeSub = useMemo(
    ()=>s.subjects.find(x=>x.id===activeId)||s.subjects[0]||null,
    [s.subjects,activeId]
  );

  useEffect(()=>{
    if(!activeId&&s.subjects.length>0) setActiveId(s.subjects[0].id);
  },[s.subjects.length]);

  // Stable close callbacks — don't change on every render
  const closeSubSheet   = useCallback(()=>setSubSheet(false),[]);
  const closeChSheet    = useCallback(()=>setChSheet(false),[]);
  const closeTopicSheet = useCallback(()=>setTopicChId(null),[]);
  const closeEditSheet  = useCallback(()=>setEditT(null),[]);

  const addSubject = useCallback(()=>{
    if(!newSubName.trim()) return;
    const id=uid();
    dispatch(st=>({...st, subjects:[...st.subjects,{ id, name:newSubName.trim(), color:newSubColor, chapters:[] }]}));
    setActiveId(id); setNewSubName(""); setSubSheet(false);
  },[newSubName,newSubColor]);

  const addChapter = useCallback(()=>{
    if(!newChName.trim()||!activeSub) return;
    const id=uid();
    dispatch(st=>({...st, subjects:st.subjects.map(sub=>sub.id!==activeSub.id?sub:
      {...sub, chapters:[...sub.chapters,{ id, name:newChName.trim(), topics:[] }]})}));
    setOpenChs(p=>({...p,[id]:true}));
    setNewChName(""); setChSheet(false);
  },[newChName,activeSub]);

  const addTopic = useCallback(()=>{
    if(!newTopicName.trim()||!activeSub||!topicChId) return;
    const t={ id:uid(), name:newTopicName.trim(), status:"not-started",
      priority:newTopicPri, examDate:"", notes:"", resources:"", studiedDate:null };
    dispatch(st=>({...st, subjects:st.subjects.map(sub=>sub.id!==activeSub.id?sub:{
      ...sub, chapters:sub.chapters.map(ch=>ch.id!==topicChId?ch:{...ch, topics:[...ch.topics,t]}),
    })}));
    setNewTopicName(""); setNewTopicPri("normal"); setTopicChId(null);
  },[newTopicName,newTopicPri,activeSub,topicChId]);

  const delSubject = useCallback(id=>
    dispatch(st=>({...st, subjects:st.subjects.filter(x=>x.id!==id)})),[]);
  const delChapter = useCallback((sId,cId)=>
    dispatch(st=>({...st, subjects:st.subjects.map(sub=>sub.id!==sId?sub:
      {...sub, chapters:sub.chapters.filter(c=>c.id!==cId)})})),[]);
  const delTopic = useCallback((sId,cId,tId)=>
    dispatch(st=>({...st, subjects:st.subjects.map(sub=>sub.id!==sId?sub:{
      ...sub, chapters:sub.chapters.map(ch=>ch.id!==cId?ch:
        {...ch, topics:ch.topics.filter(t=>t.id!==tId)}),
    })})),[]);

  const sortTopics = useCallback(topics=>{
    if(sortKey==="manual") return topics;
    const pO={high:3,normal:2,optional:1};
    const sO={"not-started":0,studying:1,"do-revision":2,studied:3};
    return [...topics].sort((a,b)=>{
      if(sortKey==="priority") return (pO[b.priority]||2)-(pO[a.priority]||2);
      if(sortKey==="status")   return sO[a.status]-sO[b.status];
      if(sortKey==="az")       return a.name.localeCompare(b.name);
      return 0;
    });
  },[sortKey]);

  const searchRes = useMemo(()=>search.trim()
    ? flatAll(s.subjects).filter(t=>
        t.name.toLowerCase().includes(search.toLowerCase())||
        t.subjectName.toLowerCase().includes(search.toLowerCase())||
        t.chapterName.toLowerCase().includes(search.toLowerCase()))
    : null
  ,[search,s.subjects]);

  const activeTopics = useMemo(
    ()=>activeSub?activeSub.chapters.flatMap(c=>c.topics):[]
  ,[activeSub]);

  return(
    <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:100 }}>
      <header style={{ position:"sticky", top:0, zIndex:50, background:C.nav,
        backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 20px 12px" }}>
          <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.7px", color:C.text }}>Syllabus</h1>
          <button onClick={()=>{ setNewSubName(""); setNewSubColor(COLORS[0]); setSubSheet(true); }}
            style={{ display:"flex", alignItems:"center", gap:6, padding:"10px 18px",
              background:C.blue, color:"#fff", border:"none", borderRadius:99,
              fontSize:15, fontWeight:600, cursor:"pointer", minHeight:44 }}>
            <Ic n="plus" size={14} color="#fff" sw={2.5}/> Subject
          </button>
        </div>

        {/* Subject pills */}
        {s.subjects.length>0&&(
          <div style={{ display:"flex", gap:8, overflowX:"auto", padding:"0 20px 12px" }}>
            {s.subjects.map(sub=>{
              const active=activeSub?.id===sub.id;
              return(
                <button key={sub.id} onClick={()=>setActiveId(sub.id)}
                  style={{ display:"flex", alignItems:"center", gap:7, padding:"9px 16px",
                    borderRadius:99, flexShrink:0, cursor:"pointer", minHeight:40,
                    border:`1.5px solid ${active?sub.color:C.sep}`,
                    background:active?sub.color+"18":C.card,
                    color:active?sub.color:C.text2,
                    fontWeight:active?700:500, fontSize:14, transition:"all .18s" }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:sub.color }}/>
                  {sub.name}
                  <span style={{ fontSize:11, opacity:.8 }}>{pct(sub.chapters.flatMap(c=>c.topics))}%</span>
                </button>
              );
            })}
          </div>
        )}

        {/* Search */}
        {s.subjects.length>0&&(
          <div style={{ padding:"0 20px 14px", position:"relative" }}>
            <div style={{ position:"absolute", left:34, top:"50%", transform:"translateY(-50%)", pointerEvents:"none" }}>
              <Ic n="search" size={16} color={C.text2} sw={1.8}/>
            </div>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search topics, chapters…" inputMode="search"
              style={{ width:"100%", padding:"12px 14px 12px 42px", borderRadius:14,
                border:`1.5px solid ${C.sep}`, fontSize:15, background:C.card,
                color:C.text, outline:"none", WebkitAppearance:"none" }}/>
          </div>
        )}
        <div style={{ height:1, background:C.sep }}/>
      </header>

      <main style={{ padding:"18px 16px" }}>
        {searchRes?(
          <>
            <p style={{ fontSize:13, color:C.text2, marginBottom:14, fontWeight:500 }}>
              {searchRes.length} result{searchRes.length!==1?"s":""}
            </p>
            {searchRes.map(t=>(
              <TopicCard key={t.id} topic={t}
                subjectId={t.subjectId} subjectName={t.subjectName} subjectColor={t.subjectColor}
                chapterId={t.chapterId} chapterName={t.chapterName}
                onTap={()=>setEditT({topic:t,subjectId:t.subjectId,chapterId:t.chapterId})}
                onDelete={()=>delTopic(t.subjectId,t.chapterId,t.id)} dark={dark}/>
            ))}
          </>
        ):s.subjects.length===0?(
          <div style={{ textAlign:"center", padding:"100px 20px" }}>
            <div style={{ width:72, height:72, borderRadius:20, background:C.card,
              border:`1.5px solid ${C.sep}`, display:"flex", alignItems:"center",
              justifyContent:"center", margin:"0 auto 24px" }}>
              <Ic n="book" size={32} color={C.text2} sw={1.5}/>
            </div>
            <p style={{ fontSize:21, fontWeight:700, color:C.text, marginBottom:8 }}>No subjects yet</p>
            <p style={{ fontSize:15, color:C.text2, lineHeight:1.5 }}>Tap "+ Subject" to start</p>
          </div>
        ):!activeSub?null:(
          <>
            {/* Subject summary card */}
            <div style={{ background:C.card, borderRadius:20, padding:"20px", marginBottom:18,
              border:`1px solid ${C.sep}`, boxShadow:dark?"none":"0 2px 8px rgba(0,0,0,.06)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <div style={{ position:"relative", flexShrink:0 }}>
                  <Ring value={pct(activeTopics)} color={activeSub.color} size={64} sw={6}/>
                  <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <span style={{ fontSize:14, fontWeight:800, color:activeSub.color }}>{pct(activeTopics)}%</span>
                  </div>
                </div>
                <div style={{ flex:1 }}>
                  <h2 style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:4 }}>{activeSub.name}</h2>
                  <p style={{ fontSize:14, color:C.text2 }}>
                    {activeTopics.filter(t=>t.status==="studied").length} of {activeTopics.length} topics studied
                  </p>
                  <div style={{ marginTop:10 }}><Bar value={pct(activeTopics)} color={activeSub.color} h={5} C={C}/></div>
                </div>
                <DelBtn onDelete={()=>delSubject(activeSub.id)} size={19}/>
              </div>
            </div>

            {/* Sort */}
            <div style={{ display:"flex", gap:8, overflowX:"auto", marginBottom:18, paddingBottom:2 }}>
              {[["manual","Custom"],["priority","Priority"],["status","Status"],["az","A–Z"]].map(([k,l])=>(
                <button key={k} onClick={()=>setSortKey(k)}
                  style={{ padding:"7px 16px", borderRadius:99, flexShrink:0, cursor:"pointer",
                    border:`1.5px solid ${sortKey===k?C.blue:C.sep}`,
                    background:sortKey===k?C.blue+"18":C.card,
                    color:sortKey===k?C.blue:C.text2,
                    fontSize:13, fontWeight:sortKey===k?700:400, transition:"all .15s", minHeight:36 }}>
                  {l}
                </button>
              ))}
            </div>

            {/* Chapters */}
            {activeSub.chapters.length===0?(
              <div style={{ textAlign:"center", padding:"48px 0", color:C.text2 }}>
                <p style={{ fontSize:16, fontWeight:500, color:C.text, marginBottom:6 }}>No chapters yet</p>
                <p style={{ fontSize:14 }}>Tap "Add Chapter" below</p>
              </div>
            ):activeSub.chapters.map(ch=>{
              const chTopics=sortTopics(ch.topics);
              const open=openChs[ch.id]!==false;
              return(
                <div key={ch.id} style={{ marginBottom:10 }}>
                  <div onClick={()=>setOpenChs(p=>({...p,[ch.id]:!open}))}
                    style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 18px",
                      background:C.card, borderRadius:open?"16px 16px 0 0":16,
                      cursor:"pointer", border:`1px solid ${C.sep}`,
                      boxShadow:dark?"none":"0 1px 4px rgba(0,0,0,.04)", minHeight:52 }}>
                    <span style={{ flex:1, fontSize:16, fontWeight:700, color:C.text }}>{ch.name}</span>
                    <div style={{ width:60 }}><Bar value={pct(ch.topics)} h={4} C={C}/></div>
                    <span style={{ fontSize:13, color:C.text2, minWidth:30, textAlign:"right", fontWeight:500 }}>
                      {ch.topics.filter(t=>t.status==="studied").length}/{ch.topics.length}
                    </span>
                    <div onClick={e=>e.stopPropagation()}>
                      <DelBtn onDelete={()=>delChapter(activeSub.id,ch.id)} size={16}/>
                    </div>
                    <div style={{ transform:open?"rotate(180deg)":"none", transition:"transform .22s", display:"flex" }}>
                      <Ic n="chevD" size={18} color={C.text2} sw={2}/>
                    </div>
                  </div>
                  {open&&(
                    <div style={{ background:C.card2, borderRadius:"0 0 16px 16px",
                      padding:"14px 12px 12px", border:`1px solid ${C.sep}`, borderTop:"none" }}>
                      {chTopics.length===0
                        ?<p style={{ fontSize:14, color:C.text2, textAlign:"center", padding:"14px 0" }}>No topics yet</p>
                        :chTopics.map(t=>(
                          <TopicCard key={t.id} topic={t}
                            subjectId={activeSub.id} subjectName={activeSub.name} subjectColor={activeSub.color}
                            chapterId={ch.id} chapterName={ch.name}
                            onTap={()=>setEditT({topic:t,subjectId:activeSub.id,chapterId:ch.id})}
                            onDelete={()=>delTopic(activeSub.id,ch.id,t.id)} dark={dark}/>
                        ))
                      }
                      <button onClick={()=>{ setTopicChId(ch.id); setNewTopicName(""); setNewTopicPri("normal"); }}
                        style={{ width:"100%", padding:"14px", marginTop:4, cursor:"pointer",
                          background:"transparent", border:`1.5px dashed ${C.sep}`, borderRadius:14,
                          fontSize:15, fontWeight:500, color:C.text2, minHeight:48,
                          display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                        <Ic n="plus" size={15} color={C.text2} sw={2}/> Add Topic
                      </button>
                    </div>
                  )}
                </div>
              );
            })}

            <button onClick={()=>{ setChSheet(true); setNewChName(""); }}
              style={{ width:"100%", marginTop:8, padding:"16px", cursor:"pointer",
                background:C.card, border:`1.5px dashed ${C.sep}`, borderRadius:16,
                fontSize:15, fontWeight:500, color:C.text2, minHeight:52,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <Ic n="plus" size={16} color={C.text2} sw={2}/> Add Chapter
            </button>
          </>
        )}
      </main>

      {/* Add Subject */}
      <Sheet open={subSheet} onClose={closeSubSheet} title="New Subject" C={C}>
        <Fld label="Colour" C={C}>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {COLORS.map(c=>(
              <button key={c} onClick={()=>setNewSubColor(c)}
                aria-pressed={c===newSubColor}
                style={{ width:42, height:42, borderRadius:"50%", background:c, border:"none",
                  cursor:"pointer", outline:c===newSubColor?`3px solid ${C.text}`:"3px solid transparent",
                  outlineOffset:2 }}/>
            ))}
          </div>
        </Fld>
        <Fld label="Subject Name" C={C}>
          <Inp C={C} value={newSubName} onChange={e=>setNewSubName(e.target.value)}
            placeholder="e.g. Physics, History…" inputMode="text"
            onKeyDown={e=>e.key==="Enter"&&addSubject()}/>
        </Fld>
        <button onClick={addSubject} disabled={!newSubName.trim()}
          style={{ width:"100%", padding:"16px", background:newSubName.trim()?C.blue:C.card3,
            color:newSubName.trim()?"#fff":C.text2, border:"none", borderRadius:16,
            fontSize:16, fontWeight:600, cursor:"pointer", minHeight:52 }}>
          Add Subject
        </button>
      </Sheet>

      {/* Add Chapter */}
      <Sheet open={chSheet} onClose={closeChSheet} title={`New Chapter — ${activeSub?.name||""}`} C={C}>
        <Fld label="Chapter Name" C={C}>
          <Inp C={C} value={newChName} onChange={e=>setNewChName(e.target.value)}
            placeholder="e.g. Thermodynamics, WWII…" inputMode="text"
            onKeyDown={e=>e.key==="Enter"&&addChapter()}/>
        </Fld>
        <button onClick={addChapter} disabled={!newChName.trim()}
          style={{ width:"100%", padding:"16px", background:newChName.trim()?C.blue:C.card3,
            color:newChName.trim()?"#fff":C.text2, border:"none", borderRadius:16,
            fontSize:16, fontWeight:600, cursor:"pointer", minHeight:52 }}>
          Add Chapter
        </button>
      </Sheet>

      {/* Add Topic */}
      <Sheet open={!!topicChId} onClose={closeTopicSheet} title="New Topic" C={C}>
        <Fld label="Topic Name" C={C}>
          <Inp C={C} value={newTopicName} onChange={e=>setNewTopicName(e.target.value)}
            placeholder="e.g. Laws of Thermodynamics…" inputMode="text"
            onKeyDown={e=>e.key==="Enter"&&addTopic()}/>
        </Fld>
        <Fld label="Priority" C={C}>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {Object.entries(PRIORITY).map(([k,v])=>(
              <button key={k} onClick={()=>setNewTopicPri(k)} aria-pressed={newTopicPri===k}
                style={{ padding:"13px 16px", borderRadius:14, cursor:"pointer",
                  fontSize:15, fontWeight:500, textAlign:"left", minHeight:50,
                  border:`1.5px solid ${newTopicPri===k?v.color:C.sep}`,
                  background:newTopicPri===k?v.color+"14":"transparent",
                  color:newTopicPri===k?v.color:C.text,
                  display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                {v.label}
                {newTopicPri===k&&<Ic n="check" size={15} color={v.color} sw={2.5}/>}
              </button>
            ))}
          </div>
        </Fld>
        <button onClick={addTopic} disabled={!newTopicName.trim()}
          style={{ width:"100%", padding:"16px", background:newTopicName.trim()?C.blue:C.card3,
            color:newTopicName.trim()?"#fff":C.text2, border:"none", borderRadius:16,
            fontSize:16, fontWeight:600, cursor:"pointer", minHeight:52 }}>
          Add Topic
        </button>
      </Sheet>

      {/* Edit Topic */}
      {editT&&(
        <TopicEditSheet topic={editT.topic} subjectId={editT.subjectId} chapterId={editT.chapterId}
          open={!!editT} onClose={closeEditSheet} dark={dark}/>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   REVISE SCREEN
═══════════════════════════════════════════════════════ */
const ReviseScreen = ()=>{
  const s    = useStore();
  const C    = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const dark = s.settings.dark;
  const all  = useMemo(()=>flatAll(s.subjects),[s.subjects]);
  const due  = useMemo(()=>all.filter(t=>isDue(t)).sort((a,b)=>(PRI_ORD[b.priority]||2)-(PRI_ORD[a.priority]||2)),[all]);
  const marked=useMemo(()=>all.filter(t=>t.status==="do-revision"&&!isDue(t)),[all]);

  return(
    <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:100 }}>
      <header style={{ position:"sticky", top:0, zIndex:50, background:C.nav,
        backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)",
        padding:"18px 20px 14px", borderBottom:`1px solid ${C.sep}` }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.7px", color:C.text }}>Revise</h1>
        <p style={{ fontSize:13, color:C.text2, marginTop:2 }}>Topics needing your attention</p>
      </header>
      <main style={{ padding:"18px 16px" }}>
        {due.length===0&&marked.length===0?(
          <div style={{ textAlign:"center", padding:"100px 0" }}>
            <div style={{ width:72, height:72, borderRadius:22, background:C.green+"20",
              display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
              <Ic n="check" size={32} color={C.green} sw={1.8}/>
            </div>
            <p style={{ fontSize:20, fontWeight:700, color:C.text }}>All caught up!</p>
            <p style={{ fontSize:15, color:C.text2, marginTop:8, lineHeight:1.6 }}>
              Topics return here after {REV_DAYS} days for spaced repetition.
            </p>
          </div>
        ):(
          <>
            {due.length>0&&(
              <section>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                  <Ic n="clock" size={14} color={C.red} sw={2}/>
                  <h2 style={{ fontSize:13, fontWeight:700, color:C.red, textTransform:"uppercase", letterSpacing:.5 }}>Due Now</h2>
                  <span style={{ fontSize:13, color:C.text2, fontWeight:600 }}>({due.length})</span>
                </div>
                {due.map(t=><ReviseCard key={t.id} t={t} dark={dark}/>)}
              </section>
            )}
            {marked.length>0&&(
              <section style={{ marginTop:due.length>0?22:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                  <Ic n="warn" size={14} color={C.orange} sw={2}/>
                  <h2 style={{ fontSize:13, fontWeight:700, color:C.orange, textTransform:"uppercase", letterSpacing:.5 }}>Marked for Revision</h2>
                  <span style={{ fontSize:13, color:C.text2, fontWeight:600 }}>({marked.length})</span>
                </div>
                {marked.map(t=><ReviseCard key={t.id} t={t} dark={dark}/>)}
              </section>
            )}
          </>
        )}
      </main>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   STATS SCREEN
═══════════════════════════════════════════════════════ */
const StatsScreen = ()=>{
  const s    = useStore();
  const C    = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const dark = s.settings.dark;
  const all  = useMemo(()=>flatAll(s.subjects),[s.subjects]);
  const over = useMemo(()=>pct(all),[all]);
  const dl   = useMemo(()=>daysTo(s.profile.examDate),[s.profile.examDate]);
  const counts=useMemo(()=>({
    "not-started":all.filter(t=>t.status==="not-started").length,
    "studying":   all.filter(t=>t.status==="studying").length,
    "studied":    all.filter(t=>t.status==="studied").length,
    "do-revision":all.filter(t=>t.status==="do-revision"||isDue(t)).length,
  }),[all]);

  return(
    <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:100 }}>
      <header style={{ position:"sticky", top:0, zIndex:50, background:C.nav,
        backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)",
        padding:"18px 20px 14px", borderBottom:`1px solid ${C.sep}` }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.7px", color:C.text }}>Stats</h1>
      </header>
      <main style={{ padding:"18px 16px" }}>
        {/* Overall ring */}
        <div style={{ background:C.card, borderRadius:22, padding:"24px", marginBottom:14,
          border:`1px solid ${C.sep}`, boxShadow:dark?"none":"0 2px 10px rgba(0,0,0,.07)",
          display:"flex", alignItems:"center", gap:22 }}>
          <div style={{ position:"relative", flexShrink:0 }}>
            <Ring value={over} size={90} sw={8}/>
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontSize:18, fontWeight:900, color:C.blue }}>{over}%</span>
            </div>
          </div>
          <div>
            <p style={{ fontSize:13, color:C.text2, fontWeight:500 }}>Overall Progress</p>
            <div style={{ fontSize:28, fontWeight:900, color:C.text, letterSpacing:"-1px", marginTop:4 }}>{over}%</div>
            <p style={{ fontSize:14, color:C.text2, marginTop:4 }}>
              {all.filter(t=>t.status==="studied").length} / {all.length} topics studied
            </p>
          </div>
        </div>

        {/* Breakdown */}
        <div style={{ background:C.card, borderRadius:20, padding:"20px", marginBottom:14,
          border:`1px solid ${C.sep}`, boxShadow:dark?"none":"0 1px 6px rgba(0,0,0,.05)" }}>
          <h2 style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:18 }}>Topic Breakdown</h2>
          {Object.entries(counts).map(([k,v])=>{
            const cfg=STATUS[k]; const p=all.length?Math.round(v/all.length*100):0;
            return(
              <div key={k} style={{ marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:9, height:9, borderRadius:"50%", background:cfg.color }}/>
                    <span style={{ fontSize:15, fontWeight:500, color:C.text }}>{cfg.label}</span>
                  </div>
                  <span style={{ fontSize:14, color:C.text2, fontWeight:600 }}>{v}</span>
                </div>
                <Bar value={p} color={cfg.color} h={7} C={C}/>
              </div>
            );
          })}
        </div>

        {/* By subject */}
        <div style={{ background:C.card, borderRadius:20, padding:"20px", marginBottom:14,
          border:`1px solid ${C.sep}`, boxShadow:dark?"none":"0 1px 6px rgba(0,0,0,.05)" }}>
          <h2 style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:18 }}>By Subject</h2>
          {s.subjects.length===0
            ?<p style={{ fontSize:15, color:C.text2 }}>No subjects added yet.</p>
            :s.subjects.map(sub=>{
              const topics=sub.chapters.flatMap(c=>c.topics);
              return(
                <div key={sub.id} style={{ marginBottom:18 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <div style={{ width:10, height:10, borderRadius:"50%", background:sub.color }}/>
                      <span style={{ fontSize:15, fontWeight:700, color:C.text }}>{sub.name}</span>
                    </div>
                    <span style={{ fontSize:13, color:C.text2, fontWeight:600 }}>
                      {topics.filter(t=>t.status==="studied").length}/{topics.length}
                    </span>
                  </div>
                  <Bar value={pct(topics)} color={sub.color} h={8} C={C}/>
                </div>
              );
            })
          }
        </div>

        {dl!==null&&(()=>{
          const ph=phaseOf(dl);
          return(
            <div style={{ background:ph?.color||C.blue, borderRadius:22, padding:"24px", color:"#fff" }}>
              <p style={{ fontSize:13, opacity:.8, marginBottom:6 }}>{s.profile.examName}</p>
              <div style={{ fontSize:56, fontWeight:900, lineHeight:1, letterSpacing:"-2px" }}>{dl}</div>
              <p style={{ fontSize:15, opacity:.75, marginTop:6 }}>days remaining</p>
              {over<70&&dl<30&&(
                <p style={{ marginTop:14, background:"rgba(255,255,255,.18)", borderRadius:14,
                  padding:"12px 16px", fontSize:14, lineHeight:1.5 }}>
                  {100-over}% remaining — consider increasing daily study time.
                </p>
              )}
            </div>
          );
        })()}
      </main>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   SETTINGS — Toggle + Row now module-level (were inside SettingsScreen — FIXED)
═══════════════════════════════════════════════════════ */
const Toggle = memo(({ on, C })=>(
  <div style={{ width:48, height:28, borderRadius:14, background:on?C.blue:C.card3,
    position:"relative", transition:"background .2s", flexShrink:0 }}>
    <div style={{ position:"absolute", top:3, left:on?"auto":3, right:on?3:"auto",
      width:22, height:22, borderRadius:"50%", background:"#fff",
      transition:"all .22s", boxShadow:"0 1px 4px rgba(0,0,0,.25)" }}/>
  </div>
));

const SRow = memo(({ icon, label, sub, onClick, right, C })=>(
  <div onClick={onClick}
    style={{ display:"flex", alignItems:"center", gap:14, padding:"16px 0",
      borderBottom:`1px solid ${C.sep}`, cursor:onClick?"pointer":"default", minHeight:60 }}>
    <div style={{ width:36, height:36, borderRadius:10, background:C.card2,
      display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <Ic n={icon} size={18} color={C.text2} sw={1.6}/>
    </div>
    <div style={{ flex:1 }}>
      <div style={{ fontSize:16, fontWeight:500, color:C.text }}>{label}</div>
      {sub&&<div style={{ fontSize:13, color:C.text2, marginTop:2 }}>{sub}</div>}
    </div>
    {right||(onClick&&<Ic n="chevR" size={16} color={C.text3} sw={2}/>)}
  </div>
));

const SettingsScreen = ()=>{
  const s         = useStore();
  const C         = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const importRef = useRef();
  const [editing, setEditing] = useState(false);
  const [pf, setPf]           = useState(()=>s.profile);

  useEffect(()=>{ if(!editing) setPf(s.profile); },[s.profile,editing]);

  const exportData = useCallback(()=>{
    const blob=new Blob([JSON.stringify(s,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`syllabus_${toDay()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  },[s]);

  const importData = useCallback(e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(!d||!Array.isArray(d.subjects)) throw new Error();
        dispatch(()=>({...INIT,...d,settings:{...INIT.settings,...(d.settings||{})}}));
      } catch { alert("Invalid backup file."); }
    };
    r.readAsText(file);
    e.target.value="";
  },[]);

  const saveProfile = useCallback(()=>{
    dispatch(st=>({...st,profile:pf})); setEditing(false);
  },[pf]);

  const toggleDark = useCallback(()=>
    dispatch(st=>({...st,settings:{...st.settings,dark:!st.settings.dark}})),[]);

  return(
    <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:100 }}>
      <header style={{ position:"sticky", top:0, zIndex:50, background:C.nav,
        backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)",
        padding:"18px 20px 14px", borderBottom:`1px solid ${C.sep}` }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:"-.7px", color:C.text }}>Settings</h1>
      </header>

      <main style={{ padding:"18px 16px" }}>
        {/* Exam Profile */}
        <div style={{ background:C.card, borderRadius:20, padding:"18px 20px", marginBottom:14, border:`1px solid ${C.sep}` }}>
          <p style={{ fontSize:11, fontWeight:700, color:C.text2, letterSpacing:.6, textTransform:"uppercase", marginBottom:14 }}>Exam Profile</p>
          {editing?(
            <>
              <Fld label="Exam Name" C={C}>
                <Inp C={C} value={pf.examName||""} onChange={e=>setPf(p=>({...p,examName:e.target.value}))}
                  inputMode="text"/>
              </Fld>
              <Fld label="Exam Date" C={C}>
                <Inp C={C} type="date" value={pf.examDate||""} onChange={e=>setPf(p=>({...p,examDate:e.target.value}))}/>
              </Fld>
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={saveProfile}
                  style={{ flex:1, padding:"14px", background:C.blue, color:"#fff",
                    border:"none", borderRadius:14, fontSize:15, fontWeight:600, cursor:"pointer", minHeight:50 }}>
                  Save
                </button>
                <button onClick={()=>{ setPf(s.profile); setEditing(false); }}
                  style={{ flex:1, padding:"14px", background:C.card2, color:C.text2,
                    border:`1px solid ${C.sep}`, borderRadius:14, fontSize:15, cursor:"pointer", minHeight:50 }}>
                  Cancel
                </button>
              </div>
            </>
          ):(
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:18, fontWeight:700, color:C.text }}>{s.profile.examName||"Not set"}</div>
                <div style={{ fontSize:14, color:C.text2, marginTop:4 }}>{s.profile.examDate||"No date set"}</div>
              </div>
              <button onClick={()=>{ setPf(s.profile); setEditing(true); }}
                style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 14px",
                  background:C.card2, border:`1px solid ${C.sep}`, borderRadius:12,
                  fontSize:14, fontWeight:500, color:C.text2, cursor:"pointer", minHeight:44 }}>
                <Ic n="edit" size={14} color={C.text2} sw={1.8}/> Edit
              </button>
            </div>
          )}
        </div>

        {/* Options */}
        <div style={{ background:C.card, borderRadius:20, padding:"0 20px", marginBottom:14, border:`1px solid ${C.sep}` }}>
          <SRow icon={s.settings.dark?"sun":"moon"} label={s.settings.dark?"Light Mode":"Dark Mode"}
            sub={`Currently ${s.settings.dark?"dark":"light"}`}
            onClick={toggleDark} right={<Toggle on={s.settings.dark} C={C}/>} C={C}/>
          <SRow icon="download" label="Export Backup" sub="Save all data as JSON" onClick={exportData} C={C}/>
          <div onClick={()=>importRef.current?.click()}
            style={{ display:"flex", alignItems:"center", gap:14, padding:"16px 0", cursor:"pointer", minHeight:60 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:C.card2,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Ic n="upload" size={18} color={C.text2} sw={1.6}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:16, fontWeight:500, color:C.text }}>Import Backup</div>
              <div style={{ fontSize:13, color:C.text2, marginTop:2 }}>Restore from a JSON file</div>
            </div>
            <Ic n="chevR" size={16} color={C.text3} sw={2}/>
          </div>
          <input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={importData}/>
        </div>

        {/* Danger */}
        <div style={{ background:C.card, borderRadius:20, padding:"0 20px", border:`1px solid ${C.sep}`, marginBottom:24 }}>
          <div style={{ padding:"18px 0", display:"flex", alignItems:"center", gap:14, minHeight:60 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:C.red+"18",
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Ic n="trash" size={18} color={C.red} sw={1.6}/>
            </div>
            <span style={{ fontSize:16, fontWeight:500, color:C.red, flex:1 }}>Reset All Data</span>
            <DelBtn onDelete={()=>dispatch(()=>({...INIT,onboarded:true,profile:s.profile}))} size={16}/>
          </div>
        </div>

        <p style={{ fontSize:13, color:C.text2, textAlign:"center", lineHeight:1.7 }}>
          All data stored locally on your device.<br/>Export regularly to keep backups.
        </p>
      </main>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   NAV + ROOT
═══════════════════════════════════════════════════════ */
const NAV = [
  { id:"today",    icon:"home",    label:"Today"    },
  { id:"syllabus", icon:"book",    label:"Syllabus" },
  { id:"revise",   icon:"refresh", label:"Revise"   },
  { id:"stats",    icon:"chart",   label:"Stats"    },
  { id:"settings", icon:"cog",     label:"Settings" },
];

const SCREENS = {
  today:    TodayScreen,
  syllabus: SyllabusScreen,
  revise:   ReviseScreen,
  stats:    StatsScreen,
  settings: SettingsScreen,
};

function App(){
  const s   = useStore();
  const C   = useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const [tab,setTab] = useState("today");

  // Flip overdue topics once on mount
  useEffect(()=>{
    const overdue = flatAll(_st.subjects).filter(t=>isDue(t)&&t.status==="studied");
    if(overdue.length===0) return;
    dispatch(st=>({...st, subjects:st.subjects.map(sub=>({
      ...sub, chapters:sub.chapters.map(ch=>({
        ...ch, topics:ch.topics.map(t=>isDue(t)&&t.status==="studied"?{...t,status:"do-revision"}:t),
      })),
    }))}));
  },[]);

  const revCount = useMemo(()=>flatAll(s.subjects).filter(t=>isDue(t)).length,[s.subjects]);

  if(!s.onboarded) return <><G/><Onboarding/></>;

  const Screen = SCREENS[tab]||TodayScreen;

  return(
    <>
      <G/>
      <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", background:C.bg }}>
        <div key={tab} style={{ animation:"fadeUp .18s ease" }}>
          <Screen/>
        </div>

        <nav aria-label="Main navigation"
          style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
            width:"100%", maxWidth:430, background:C.nav,
            backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)",
            borderTop:`1px solid ${C.sep}`, display:"flex",
            padding:"10px 0", zIndex:200,
            paddingBottom:"calc(10px + env(safe-area-inset-bottom,0px))" }}>
          {NAV.map(item=>{
            const active=tab===item.id;
            return(
              <button key={item.id} onClick={()=>setTab(item.id)}
                aria-label={item.label} aria-current={active?"page":undefined}
                style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                  background:"none", border:"none", cursor:"pointer", padding:"4px 0",
                  position:"relative", minHeight:52 }}>
                <div style={{ width:34, height:34, borderRadius:11,
                  background:active?C.blue+"18":"transparent",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"background .18s" }}>
                  <Ic n={item.icon} size={21} color={active?C.blue:C.text2} sw={active?2.2:1.6}/>
                </div>
                {item.id==="revise"&&revCount>0&&(
                  <div style={{ position:"absolute", top:0, left:"calc(50% + 6px)",
                    width:18, height:18, background:C.red, borderRadius:"50%",
                    fontSize:10, fontWeight:800, color:"#fff",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    border:`2px solid ${C.bg}` }}>
                    {revCount>9?"9+":revCount}
                  </div>
                )}
                <span style={{ fontSize:10, fontWeight:active?700:400,
                  color:active?C.blue:C.text2, transition:"color .18s" }}>
                  {item.label}
                </span>
              </button>
            );
          })}
        </nav>
      </div>
    </>
  );
}

// ─── Mount React app ─────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// ─── Hide splash after mount ─────────────────────────
setTimeout(() => {
  if (window.__clearSplashWatchdog) window.__clearSplashWatchdog();
  const s = document.getElementById("splash");
  if (s) { s.classList.add("hidden"); setTimeout(() => s.remove(), 500); }
}, 300);

</script>
