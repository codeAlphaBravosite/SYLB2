<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Syllabus Tracker"/>
  <meta name="theme-color" content="#007AFF"/>
  <meta name="description" content="Track your exam syllabus with spaced repetition"/>
  <title>Syllabus Tracker</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23007AFF'/><rect x='22' y='20' width='26' height='60' rx='4' fill='white'/><rect x='52' y='20' width='26' height='60' rx='4' fill='white'/><rect x='47' y='20' width='6' height='60' fill='%23007AFF'/></svg>"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overscroll-behavior:none}
    body{background:#007AFF}
    #splash{position:fixed;inset:0;background:#007AFF;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s ease}
    #splash.out{opacity:0;pointer-events:none}
    #splash svg{animation:pulse 1.3s ease-in-out infinite}
    #splash p{color:rgba(255,255,255,.8);font-size:15px;margin-top:18px;font-family:system-ui,sans-serif}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  </style>
</head>
<body>
<div id="splash">
  <svg width="88" height="88" viewBox="0 0 100 100" fill="none">
    <rect width="100" height="100" rx="22" fill="rgba(255,255,255,.18)"/>
    <rect x="22" y="20" width="26" height="60" rx="4" fill="white"/>
    <rect x="52" y="20" width="26" height="60" rx="4" fill="white"/>
    <rect x="47" y="20" width="6" height="60" fill="#007AFF"/>
  </svg>
  <p>Syllabus Tracker</p>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
const{useState,useEffect,useRef,useCallback,useMemo,memo}=React;

/* ── STYLES ── */
const G=()=>React.createElement('style',null,`
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body,#root{height:100%;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
  body{font-family:'Geist',system-ui,sans-serif;background:#F2F2F7}
  button,input,textarea,select{font-family:'Geist',system-ui,sans-serif}
  ::-webkit-scrollbar{display:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
`);

/* ── ICONS ── */
const ICONS={
  home:'M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H14v-5h-4v5H4a1 1 0 01-1-1z',
  book:['M4 19.5A2.5 2.5 0 016.5 17H20','M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z'],
  refresh:['M2 12a10 10 0 1010-10c-2.76 0-5.26 1.12-7.07 2.93L2 8','M2 2v6h6'],
  chart:{lines:['18 20 18 10','12 20 12 4','6 20 6 14']},
  cog:['circle:12,12,3','M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z'],
  plus:{lines:['12 5 12 19','5 12 19 12']},
  chevR:'M9 18l6-6-6-6',
  chevD:'M6 9l6 6 6-6',
  trash:['poly:3 6 5 6 21 6','M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6','M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2'],
  check:'M20 6L9 17 4 12',
  edit:['M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7','M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'],
  close:{lines:['18 6 6 18','6 6 18 18']},
  sun:{circle:'12,12,5',lines:['12 1 12 3','12 21 12 23','4.22 4.22 5.64 5.64','18.36 18.36 19.78 19.78','1 12 3 12','21 12 23 12','4.22 19.78 5.64 18.36','18.36 5.64 19.78 4.22']},
  moon:'M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z',
  download:['M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4','poly:7 10 12 15 17 10','M12 15V3'],
  upload:['M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4','poly:17 8 12 3 7 8','M12 3v12'],
  clock:['circle:12,12,10','M12 6v6l4 2'],
  flag:['M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z','M4 22V15'],
  link:['M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71','M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71'],
  warn:['M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z','M12 9v4','M12 17h.01'],
  search:['circle:11,11,8','M21 21l-4.35-4.35'],
};

const Ic=memo(({n,size=22,color='currentColor',sw=1.8})=>{
  const p={fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
  const ic=ICONS[n];
  if(!ic) return null;
  const paths=[];
  const items=Array.isArray(ic)?ic:[ic];
  items.forEach((d,i)=>{
    if(typeof d==='string'){
      if(d.startsWith('poly:')) paths.push(React.createElement('polyline',{...p,key:i,points:d.slice(5)}));
      else if(d.startsWith('circle:')) { const[cx,cy,r]=d.slice(7).split(','); paths.push(React.createElement('circle',{...p,key:i,cx,cy,r})); }
      else paths.push(React.createElement('path',{...p,key:i,d}));
    } else if(d && d.lines){
      d.lines.forEach((l,j)=>{ const[x1,y1,x2,y2]=l.split(' '); paths.push(React.createElement('line',{...p,key:j,x1,y1,x2,y2})); });
    } else if(d && d.circle){
      const[cx,cy,r]=d.circle.split(',');
      paths.push(React.createElement('circle',{...p,key:'c',cx,cy,r}));
      if(d.lines) d.lines.forEach((l,j)=>{ const[x1,y1,x2,y2]=l.split(' '); paths.push(React.createElement('line',{...p,key:j,x1,y1,x2,y2})); });
    }
  });
  return React.createElement('svg',{viewBox:'0 0 24 24',width:size,height:size,'aria-hidden':'true',style:{display:'block',flexShrink:0}},paths);
});

/* ── CONFIG ── */
const STATUS={
  'not-started':{label:'Not Started',color:'#8E8E93',bg:'#8E8E9322'},
  'studying':   {label:'Studying',   color:'#FF9500',bg:'#FF950022'},
  'studied':    {label:'Studied',    color:'#34C759',bg:'#34C75922'},
  'do-revision':{label:'Do Revision',color:'#FF3B30',bg:'#FF3B3022'},
};
const PRIORITY={
  'high':    {label:'High Weightage',color:'#FF3B30',bg:'#FF3B3018'},
  'normal':  {label:'Normal',        color:'#007AFF',bg:'#007AFF18'},
  'optional':{label:'Optional',      color:'#8E8E93',bg:'#8E8E9318'},
};
const COLORS=['#007AFF','#FF3B30','#34C759','#FF9500','#AF52DE','#5AC8FA','#FF2D55','#00C7BE','#FF6B00','#636366'];
const REV_DAYS=7;
const PRI_ORD={high:3,normal:2,optional:1};
const TH={
  light:{bg:'#F2F2F7',card:'#FFFFFF',card2:'#F2F2F7',card3:'#E5E5EA',text:'#000000',text2:'#6C6C70',text3:'#C7C7CC',sep:'#E5E5EA',nav:'rgba(255,255,255,.92)',blue:'#007AFF',red:'#FF3B30',green:'#34C759',orange:'#FF9500'},
  dark: {bg:'#000000',card:'#1C1C1E',card2:'#2C2C2E',card3:'#3A3A3C',text:'#FFFFFF',text2:'#8E8E93',text3:'#48484A',sep:'#2C2C2E',nav:'rgba(0,0,0,.92)',  blue:'#007AFF',red:'#FF3B30',green:'#34C759',orange:'#FF9500'},
};
const T=dark=>dark?TH.dark:TH.light;

/* ── UTILS ── */
const uid=()=>Math.random().toString(36).slice(2,9);
const toDay=()=>new Date().toISOString().split('T')[0];
const daysTo=d=>d?Math.ceil((new Date(d)-new Date())/86400000):null;
const phaseOf=d=>{
  if(d==null)return null;
  if(d>60)return{label:'Learning Phase',color:'#007AFF'};
  if(d>30)return{label:'Consolidation', color:'#FF9500'};
  if(d>14)return{label:'Revision Mode', color:'#AF52DE'};
  return{label:'Final Sprint',color:'#FF3B30'};
};
const isDue=t=>{
  if(t.status!=='studied'||!t.studiedDate)return false;
  const due=new Date(t.studiedDate);
  due.setDate(due.getDate()+REV_DAYS);
  return new Date()>=due;
};
const pct=topics=>{
  if(!topics.length)return 0;
  return Math.round(topics.filter(t=>t.status==='studied'||t.status==='do-revision').length/topics.length*100);
};
const flatAll=subjects=>subjects.flatMap(s=>s.chapters.flatMap(c=>c.topics.map(t=>({
  ...t,subjectId:s.id,subjectName:s.name,subjectColor:s.color,chapterId:c.id,chapterName:c.name,
}))));

/* ── STORE ── */
const KEY='st_v10';
const INIT={onboarded:false,profile:{examName:'',examDate:''},subjects:[],settings:{dark:false}};
const safeParse=raw=>{try{const d=JSON.parse(raw);return d&&typeof d==='object'?{...INIT,...d,settings:{...INIT.settings,...(d.settings||{})}}:INIT;}catch{return INIT;}};
let _st=safeParse(localStorage.getItem(KEY)||'');
let _ls=new Set();
let _pt=null;
const useStore=()=>{
  const[,tick]=useState(0);
  useEffect(()=>{const f=()=>tick(n=>n+1);_ls.add(f);return()=>_ls.delete(f);},[]);
  return _st;
};
const dispatch=fn=>{
  _st=fn(_st);
  clearTimeout(_pt);
  _pt=setTimeout(()=>{try{localStorage.setItem(KEY,JSON.stringify(_st));}catch{}},300);
  _ls.forEach(f=>f());
};
const setTopicStatus=(sId,cId,tId,status)=>dispatch(st=>({...st,subjects:st.subjects.map(sub=>sub.id!==sId?sub:{...sub,chapters:sub.chapters.map(ch=>ch.id!==cId?ch:{...ch,topics:ch.topics.map(t=>t.id!==tId?t:{...t,status,studiedDate:status==='studied'?toDay():null})})})}));

/* ── PRIMITIVES ── */
const ce=React.createElement;

const Ring=memo(({value,color='#007AFF',size=54,sw=5})=>{
  const r=(size-sw*2)/2,circ=2*Math.PI*r;
  return ce('svg',{width:size,height:size,'aria-hidden':'true',style:{flexShrink:0,transform:'rotate(-90deg)'}},
    ce('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color+'30',strokeWidth:sw}),
    ce('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:sw,strokeDasharray:circ,strokeDashoffset:circ*(1-value/100),strokeLinecap:'round',style:{transition:'stroke-dashoffset .6s ease'}}),
  );
});

const Bar=memo(({value,color='#007AFF',h=4,C})=>
  ce('div',{style:{background:C.card3,borderRadius:99,height:h,overflow:'hidden'}},
    ce('div',{style:{width:`${value}%`,background:color,height:'100%',borderRadius:99,transition:'width .5s ease'}}),
  )
);

const Badge=memo(({label,color,bg})=>
  ce('span',{style:{fontSize:12,fontWeight:600,color,background:bg,padding:'4px 10px',borderRadius:99,whiteSpace:'nowrap',display:'inline-block'}},label)
);

const DelBtn=memo(({onDelete,size=18})=>{
  const[armed,setArmed]=useState(false);
  const tmr=useRef(null);
  const arm=e=>{e.stopPropagation();setArmed(true);tmr.current=setTimeout(()=>setArmed(false),3000);};
  const fire=e=>{e.stopPropagation();clearTimeout(tmr.current);setArmed(false);onDelete();};
  const off=e=>{e.stopPropagation();clearTimeout(tmr.current);setArmed(false);};
  useEffect(()=>()=>clearTimeout(tmr.current),[]);
  if(armed) return ce('div',{style:{display:'flex',gap:6},onClick:e=>e.stopPropagation()},
    ce('button',{onClick:fire,style:{padding:'6px 14px',background:'#FF3B30',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',minHeight:36}},'Delete'),
    ce('button',{onClick:off, style:{padding:'6px 12px',background:'transparent',color:'#8E8E93',border:'1px solid #C7C7CC',borderRadius:8,fontSize:13,cursor:'pointer',minHeight:36}},'Cancel'),
  );
  return ce('button',{onClick:arm,style:{background:'transparent',border:'none',cursor:'pointer',padding:8,display:'flex',alignItems:'center',borderRadius:8,minHeight:44,minWidth:44,justifyContent:'center'}},
    ce(Ic,{n:'trash',size,color:'#8E8E93',sw:1.6}),
  );
});

const Sheet=memo(({open,onClose,title,children,C})=>{
  const ref=useRef(onClose);
  useEffect(()=>{ref.current=onClose;});
  useEffect(()=>{
    if(!open)return;
    const esc=e=>{if(e.key==='Escape')ref.current?.();};
    document.addEventListener('keydown',esc);
    return()=>document.removeEventListener('keydown',esc);
  },[open]);
  if(!open)return null;
  return ce('div',{style:{position:'fixed',inset:0,zIndex:500,display:'flex',flexDirection:'column',justifyContent:'flex-end'},onClick:onClose},
    ce('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,.55)',animation:'fadeIn .2s ease'}}),
    ce('div',{role:'dialog','aria-modal':'true','aria-label':title,onClick:e=>e.stopPropagation(),style:{position:'relative',background:C.card,borderRadius:'22px 22px 0 0',maxHeight:'90vh',overflowY:'auto',animation:'sheetUp .28s ease',paddingBottom:'env(safe-area-inset-bottom,0px)'}},
      ce('div',{style:{display:'flex',justifyContent:'center',padding:'14px 0 0'}},ce('div',{style:{width:36,height:4,borderRadius:99,background:C.card3}})),
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 22px 0'}},
        ce('span',{style:{fontSize:18,fontWeight:700,color:C.text}},title),
        ce('button',{onClick:onClose,'aria-label':'Close',style:{background:C.card2,border:'none',borderRadius:'50%',width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}},
          ce(Ic,{n:'close',size:14,color:C.text2,sw:2}),
        ),
      ),
      ce('div',{style:{padding:'20px 22px 32px'}},children),
    ),
  );
});

const Fld=({label,children,C})=>ce('div',{style:{marginBottom:20}},
  ce('div',{style:{fontSize:11,fontWeight:700,color:C.text2,letterSpacing:.6,textTransform:'uppercase',marginBottom:10}},label),
  children,
);
const Inp=({C,style:s={},...rest})=>ce('input',{...rest,style:{width:'100%',padding:'14px 16px',borderRadius:14,border:`1.5px solid ${C.sep}`,fontSize:16,background:C.card2,color:C.text,outline:'none',WebkitAppearance:'none',...s}});

const StatusRow=memo(({currentStatus,isRevDue,onChange,C})=>{
  const eff=isRevDue?'do-revision':currentStatus;
  return ce('div',{style:{display:'flex',gap:6,flexWrap:'wrap',paddingTop:12,borderTop:`1px solid ${C.sep}`}},
    Object.entries(STATUS).map(([k,v])=>{
      const active=eff===k;
      return ce('button',{key:k,onClick:e=>{e.stopPropagation();onChange(k);},style:{padding:'7px 13px',borderRadius:99,fontSize:12,fontWeight:600,cursor:'pointer',border:`1.5px solid ${active?v.color:C.sep}`,background:active?v.color:'transparent',color:active?'#fff':C.text2,transition:'all .15s',whiteSpace:'nowrap',minHeight:36}},v.label);
    }),
  );
});

/* ── TOPIC CARD ── */
const TopicCard=memo(({topic,subjectId,chapterId,subjectName,chapterName,subjectColor,onTap,onDelete,dark})=>{
  const C=T(dark);
  const due=isDue(topic);
  const eff=due?'do-revision':topic.status;
  const st=STATUS[eff]||STATUS['not-started'];
  const pri=PRIORITY[topic.priority||'normal'];
  const done=topic.status==='studied'||topic.status==='do-revision';
  const toggle=useCallback(e=>{e.stopPropagation();setTopicStatus(subjectId,chapterId,topic.id,done?'not-started':'studied');},[subjectId,chapterId,topic.id,done]);
  const change=useCallback(k=>setTopicStatus(subjectId,chapterId,topic.id,k),[subjectId,chapterId,topic.id]);
  return ce('article',{onClick:onTap,style:{background:C.card,borderRadius:18,marginBottom:12,border:`1px solid ${C.sep}`,boxShadow:dark?'none':'0 2px 8px rgba(0,0,0,.06)',display:'flex',alignItems:'stretch',overflow:'hidden',cursor:'pointer'}},
    ce('div',{style:{width:5,background:st.color,flexShrink:0}}),
    ce('div',{style:{flex:1,padding:'16px 16px 16px 18px'}},
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
        ce('div',{style:{display:'flex',alignItems:'center',gap:6}},
          ce('div',{style:{width:8,height:8,borderRadius:'50%',background:subjectColor}}),
          ce('span',{style:{fontSize:12,color:C.text2,fontWeight:500}},subjectName+' › '+chapterName),
        ),
        ce('div',{onClick:e=>e.stopPropagation()},ce(DelBtn,{onDelete,size:17})),
      ),
      ce('div',{style:{display:'flex',alignItems:'flex-start',gap:14,marginBottom:14}},
        ce('button',{onClick:toggle,role:'checkbox','aria-checked':done,style:{width:32,height:32,borderRadius:9,flexShrink:0,border:'none',cursor:'pointer',marginTop:1,background:done?C.green:'transparent',outline:`2px solid ${done?C.green:C.card3}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}},
          done&&ce(Ic,{n:'check',size:14,color:'#fff',sw:2.5}),
        ),
        ce('span',{style:{fontSize:17,fontWeight:700,color:done?C.text2:C.text,lineHeight:1.3,flex:1,textDecoration:done&&!due?'line-through':'none',textDecorationColor:C.text3}},topic.name),
      ),
      ce('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}},
        ce(Badge,{label:st.label,color:st.color,bg:st.bg}),
        ce(Badge,{label:pri.label,color:pri.color,bg:pri.bg}),
        topic.examDate&&ce('span',{style:{fontSize:12,color:C.text2,display:'flex',alignItems:'center',gap:4}},ce(Ic,{n:'clock',size:11,color:C.text2}),topic.examDate),
        due&&ce(Badge,{label:'Revision Due!',color:C.red,bg:C.red+'18'}),
      ),
      topic.notes&&ce('div',{style:{fontSize:13,color:C.text2,lineHeight:1.5,borderTop:`1px solid ${C.sep}`,paddingTop:10,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}},topic.notes),
      ce(StatusRow,{currentStatus:topic.status,isRevDue:due,onChange:change,C}),
    ),
  );
});

/* ── TODAY CARD (used in Today + Revise screens) ── */
const TodayCard=memo(({t,accentColor,dark})=>{
  const C=T(dark);
  const due=isDue(t);
  const eff=due?'do-revision':t.status;
  const st=STATUS[eff]||STATUS['not-started'];
  const pri=PRIORITY[t.priority||'normal'];
  const done=t.status==='studied'||t.status==='do-revision';
  const toggle=useCallback(()=>setTopicStatus(t.subjectId,t.chapterId,t.id,done?'not-started':'studied'),[t.subjectId,t.chapterId,t.id,done]);
  const change=useCallback(k=>setTopicStatus(t.subjectId,t.chapterId,t.id,k),[t.subjectId,t.chapterId,t.id]);
  return ce('article',{style:{background:C.card,borderRadius:18,marginBottom:12,border:`1px solid ${C.sep}`,boxShadow:dark?'none':'0 2px 8px rgba(0,0,0,.06)',display:'flex',alignItems:'stretch',overflow:'hidden'}},
    ce('div',{style:{width:5,background:accentColor,flexShrink:0}}),
    ce('div',{style:{flex:1,padding:'16px 16px 14px 18px'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:8}},
        ce('div',{style:{width:7,height:7,borderRadius:'50%',background:t.subjectColor}}),
        ce('span',{style:{fontSize:12,color:C.text2,fontWeight:500}},t.chapterName),
      ),
      ce('div',{style:{display:'flex',alignItems:'flex-start',gap:12,marginBottom:12}},
        ce('button',{onClick:toggle,role:'checkbox','aria-checked':done,style:{width:30,height:30,borderRadius:8,flexShrink:0,border:'none',cursor:'pointer',marginTop:1,background:done?C.green:'transparent',outline:`2px solid ${done?C.green:C.card3}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .18s'}},

const Onboarding=()=>{
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');
  const[date,setDate]=useState('');
  const C=TH.light;
  const steps=[
    {icon:'🎯',title:'Which exam are you\npreparing for?',valid:name.trim().length>0,body:ce(Inp,{C,value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. UPSC, JEE, GMAT…',inputMode:'text'})},
    {icon:'📅',title:'When is your\nexam date?',valid:!!date,body:ce(Inp,{C,type:'date',value:date,onChange:e=>setDate(e.target.value),min:toDay()})},
  ];
  const cur=steps[step];
  const next=()=>{
    if(step<steps.length-1){setStep(step+1);return;}
    dispatch(s=>({...s,onboarded:true,profile:{examName:name,examDate:date}}));
  };
  return ce('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 28px'}},
    ce('div',{style:{width:'100%',maxWidth:380,animation:'fadeUp .3s ease'}},

          steps.map((_,i)=>ce('div',{key:i,style:{height:3,width:i===step?28:8,borderRadius:99,background:i<=step?C.blue:C.sep,transition:'all .3s'}})),
        ),
      ),

      ce('button',{onClick:next,disabled:!cur.valid,style:{width:'100%',padding:16,background:cur.valid?C.blue:C.card3,color:cur.valid?'#fff':C.text2,border:'none',borderRadius:16,fontSize:17,fontWeight:700,cursor:cur.valid?'pointer':'default',transition:'all .2s',minHeight:52}},step<steps.length-1?'Continue':'Get Started'),

  useEffect(()=>{if(!editing)setPf(s.profile);},[s.profile,editing]);
  const exportData=useCallback(()=>{
    const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='syllabus_'+toDay()+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  },[s]);
  const importData=useCallback(e=>{
    const file=e.target.files?.[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d||!Array.isArray(d.subjects))throw new Error();dispatch(()=>({...INIT,...d,settings:{...INIT.settings,...(d.settings||{})}}));}catch{alert('Invalid backup file.');}};
    r.readAsText(file);e.target.value='';
  },[]);
  const saveProfile=useCallback(()=>{dispatch(st=>({...st,profile:pf}));setEditing(false);},[pf]);
  const toggleDark=useCallback(()=>dispatch(st=>({...st,settings:{...st.settings,dark:!st.settings.dark}})),[]);
  const hdrS={position:'sticky',top:0,zIndex:50,background:C.nav,backdropFilter:'blur(24px) saturate(180%)',WebkitBackdropFilter:'blur(24px) saturate(180%)',padding:'18px 20px 14px',borderBottom:`1px solid ${C.sep}`};
  return ce('div',{style:{background:C.bg,minHeight:'100vh',paddingBottom:100}},
    ce('header',{style:hdrS},ce('h1',{style:{fontSize:26,fontWeight:800,letterSpacing:'-.7px',color:C.text}},'Settings')),
    ce('main',{style:{padding:'18px 16px'}},
      ce('div',{style:{background:C.card,borderRadius:20,padding:'18px 20px',marginBottom:14,border:`1px solid ${C.sep}`}},
        ce('p',{style:{fontSize:11,fontWeight:700,color:C.text2,letterSpacing:.6,textTransform:'uppercase',marginBottom:14}},'Exam Profile'),
        editing?ce('div',null,
          ce(Fld,{label:'Exam Name',C},ce(Inp,{C,value:pf.examName||'',onChange:e=>setPf(p=>({...p,examName:e.target.value})),inputMode:'text'})),
          ce(Fld,{label:'Exam Date',C},ce(Inp,{C,type:'date',value:pf.examDate||'',onChange:e=>setPf(p=>({...p,examDate:e.target.value}))})),
          ce('div',{style:{display:'flex',gap:10}},
            ce('button',{onClick:saveProfile,style:{flex:1,padding:14,background:C.blue,color:'#fff',border:'none',borderRadius:14,fontSize:15,fontWeight:600,cursor:'pointer',minHeight:50}},'Save'),
            ce('button',{onClick:()=>{setPf(s.profile);setEditing(false);},style:{flex:1,padding:14,background:C.card2,color:C.text2,border:`1px solid ${C.sep}`,borderRadius:14,fontSize:15,cursor:'pointer',minHeight:50}},'Cancel'),
          ),
        ):ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          ce('div',null,
            ce('div',{style:{fontSize:18,fontWeight:700,color:C.text}},s.profile.examName||'Not set'),
            ce('div',{style:{fontSize:14,color:C.text2,marginTop:4}},s.profile.examDate||'No date set'),
          ),
          ce('button',{onClick:()=>{setPf(s.profile);setEditing(true);},style:{display:'flex',alignItems:'center',gap:6,padding:'9px 14px',background:C.card2,border:`1px solid ${C.sep}`,borderRadius:12,fontSize:14,fontWeight:500,color:C.text2,cursor:'pointer',minHeight:44}},
            ce(Ic,{n:'edit',size:14,color:C.text2,sw:1.8}),' Edit',
          ),
        ),
      ),
      ce('div',{style:{background:C.card,borderRadius:20,padding:'0 20px',marginBottom:14,border:`1px solid ${C.sep}`}},
        ce(SRow,{icon:s.settings.dark?'sun':'moon',label:s.settings.dark?'Light Mode':'Dark Mode',sub:'Currently '+(s.settings.dark?'dark':'light'),onClick:toggleDark,right:ce(Toggle,{on:s.settings.dark,C}),C}),
        ce(SRow,{icon:'download',label:'Export Backup',sub:'Save all data as JSON',onClick:exportData,C}),
        ce('div',{onClick:()=>importRef.current?.click(),style:{display:'flex',alignItems:'center',gap:14,padding:'16px 0',cursor:'pointer',minHeight:60}},
          ce('div',{style:{width:36,height:36,borderRadius:10,background:C.card2,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},ce(Ic,{n:'upload',size:18,color:C.text2,sw:1.6})),
          ce('div',{style:{flex:1}},ce('div',{style:{fontSize:16,fontWeight:500,color:C.text}},'Import Backup'),ce('div',{style:{fontSize:13,color:C.text2,marginTop:2}},'Restore from a JSON file')),
          ce(Ic,{n:'chevR',size:16,color:C.text3,sw:2}),
        ),
        ce('input',{ref:importRef,type:'file',accept:'.json',style:{display:'none'},onChange:importData}),
      ),
      ce('div',{style:{background:C.card,borderRadius:20,padding:'0 20px',border:`1px solid ${C.sep}`,marginBottom:24}},
        ce('div',{style:{padding:'18px 0',display:'flex',alignItems:'center',gap:14,minHeight:60}},
          ce('div',{style:{width:36,height:36,borderRadius:10,background:C.red+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},ce(Ic,{n:'trash',size:18,color:C.red,sw:1.6})),
          ce('span',{style:{fontSize:16,fontWeight:500,color:C.red,flex:1}},'Reset All Data'),
          ce(DelBtn,{onDelete:()=>dispatch(()=>({...INIT,onboarded:true,profile:s.profile})),size:16}),
        ),
      ),
      ce('p',{style:{fontSize:13,color:C.text2,textAlign:'center',lineHeight:1.7}},'All data stored locally on your device.'),
    ),
  );
};

/* ── NAV + APP ── */
const NAV=[
  {id:'today',   icon:'home',    label:'Today'},
  {id:'syllabus',icon:'book',    label:'Syllabus'},
  {id:'revise',  icon:'refresh', label:'Revise'},
  {id:'stats',   icon:'chart',   label:'Stats'},
  {id:'settings',icon:'cog',     label:'Settings'},
];
const SCREENS={today:TodayScreen,syllabus:SyllabusScreen,revise:ReviseScreen,stats:StatsScreen,settings:SettingsScreen};

function App(){
  const s=useStore();
  const C=useMemo(()=>T(s.settings.dark),[s.settings.dark]);
  const[tab,setTab]=useState('today');
  useEffect(()=>{
    const overdue=flatAll(_st.subjects).filter(t=>isDue(t)&&t.status==='studied');
    if(!overdue.length)return;
    dispatch(st=>({...st,subjects:st.subjects.map(sub=>({...sub,chapters:sub.chapters.map(ch=>({...ch,topics:ch.topics.map(t=>isDue(t)&&t.status==='studied'?{...t,status:'do-revision'}:t)}))}))}));
  },[]);
  const revCount=useMemo(()=>flatAll(s.subjects).filter(t=>isDue(t)).length,[s.subjects]);
  if(!s.onboarded)return ce(React.Fragment,null,ce(G),ce(Onboarding));
  const Screen=SCREENS[tab]||TodayScreen;
  return ce(React.Fragment,null,
    ce(G),
    ce('div',{style:{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:C.bg}},
      ce('div',{key:tab,style:{animation:'fadeUp .18s ease'}},ce(Screen)),
      ce('nav',{'aria-label':'Main navigation',style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.nav,backdropFilter:'blur(24px) saturate(180%)',WebkitBackdropFilter:'blur(24px) saturate(180%)',borderTop:`1px solid ${C.sep}`,display:'flex',padding:'10px 0',zIndex:200,paddingBottom:'calc(10px + env(safe-area-inset-bottom,0px))'}},
        NAV.map(item=>{
          const active=tab===item.id;
          return ce('button',{key:item.id,onClick:()=>setTab(item.id),'aria-label':item.label,'aria-current':active?'page':undefined,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:'4px 0',position:'relative',minHeight:52}},
            ce('div',{style:{width:34,height:34,borderRadius:11,background:active?C.blue+'18':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .18s'}},
              ce(Ic,{n:item.icon,size:21,color:active?C.blue:C.text2,sw:active?2.2:1.6}),
            ),
            item.id==='revise'&&revCount>0&&ce('div',{style:{position:'absolute',top:0,left:'calc(50% + 6px)',width:18,height:18,background:C.red,borderRadius:'50%',fontSize:10,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${C.bg}`}},revCount>9?'9+':revCount),
            ce('span',{style:{fontSize:10,fontWeight:active?700:400,color:active?C.blue:C.text2,transition:'color .18s'}},item.label),
          );
        }),
      ),
    ),
  );
}
const _root=ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
requestAnimationFrame(()=>requestAnimationFrame(()=>{const s=document.getElementById('splash');if(s){s.classList.add('out');setTimeout(()=>s.remove(),350);}}));
</script>
</body>
</html>
